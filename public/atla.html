<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlama Animasyonu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Bu stiller artık JS tarafından dinamik olarak ezilecek */

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Roboto', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
            image-rendering: optimizeSpeed;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        body {
            position: relative;
            min-width: 100vw;
            min-height: 100vh;
        }

        .karakter {
            width: 100px;
            aspect-ratio: 1;
            background-image: url('karakter.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            top: -150px;
            left: -150px;
            opacity: 0;
            z-index: 10;
            transition: opacity 0.3s ease;
            will-change: transform;
            transform: translateZ(0);
        }

        /* --- DEĞİŞİKLİK 1: Sabit 'aspect-ratio' kaldırıldı --- */
        /* 'height' ve 'aspect-ratio' artık JS tarafından dinamik olarak hesaplanıp ayarlanacak. */
        #havuz {
            width: 300px;
            background-image: url('havuz.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateZ(0);
            box-sizing: border-box;
            transition: opacity 0.5s ease;
            z-index: 5;
            will-change: transform, opacity;
            backface-visibility: hidden;
            image-rendering: optimizeSpeed;
            image-rendering: crisp-edges;
        }

        /* --- DEĞİŞİKLİK 1 BİTTİ --- */

        /* Glassmorphic Widget Container */
        .widget-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(18, 18, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(200, 162, 216, 0.3);
            border-radius: 16px;
            padding: 16px;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            z-index: 200;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        
        .widget-container.active {
            opacity: 1;
            transform: translateY(0);
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .widget-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #C8A2C8, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .widget-timer {
            font-size: 14px;
            font-weight: 700;
            color: #ff00ff;
            background: rgba(255, 0, 255, 0.1);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 255, 0.3);
        }

        .widget-body {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .widget-word-pattern {
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
            margin: 12px 0;
        }

        .widget-stats {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 🦋 Butterfly game styles */
        .butterfly-container {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 150;
            pointer-events: none;
            will-change: transform;
        }

        .butterfly {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .butterfly .wing {
            position: absolute;
            width: 26px;
            height: 44px;
            border-radius: 50% 50% 30% 30%;
            top: 5px;
        }

        .butterfly .wing-left {
            left: 4px;
            transform-origin: right center;
            background: linear-gradient(135deg, var(--wing-color-1), var(--wing-color-2));
            box-shadow: 0 0 15px var(--glow-color);
            animation: flap-left 0.12s infinite alternate ease-in-out;
        }

        .butterfly .wing-right {
            right: 4px;
            transform-origin: left center;
            background: linear-gradient(225deg, var(--wing-color-1), var(--wing-color-2));
            box-shadow: 0 0 15px var(--glow-color);
            animation: flap-right 0.12s infinite alternate ease-in-out;
        }

        .butterfly .body {
            position: absolute;
            width: 6px;
            height: 38px;
            background: #111;
            left: 27px;
            top: 8px;
            border-radius: 3px;
            box-shadow: 0 0 5px #000;
        }

        @keyframes flap-left {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-70deg); }
        }

        @keyframes flap-right {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(70deg); }
        }

        .butterfly-yesil {
            --wing-color-1: #2ecc71;
            --wing-color-2: #27ae60;
            --glow-color: rgba(46, 204, 113, 0.6);
        }

        .butterfly-mavi {
            --wing-color-1: #00e5ff;
            --wing-color-2: #2980b9;
            --glow-color: rgba(0, 229, 255, 0.8);
        }
        .butterfly-container.butterfly-mavi {
            animation: pulse-glow 0.8s infinite alternate ease-in-out;
        }

        .butterfly-mor {
            --wing-color-1: #b266ff;
            --wing-color-2: #8a2be2;
            --glow-color: rgba(178, 102, 255, 0.8);
        }
        .butterfly-container.butterfly-mor {
            animation: pulse-glow 0.6s infinite alternate ease-in-out;
        }

        .butterfly-gumus {
            --wing-color-1: #bdc3c7;
            --wing-color-2: #7f8c8d;
            --glow-color: rgba(189, 195, 199, 0.5);
        }

        .butterfly-kirmizi {
            --wing-color-1: #ff2a2a;
            --wing-color-2: #c0392b;
            --glow-color: rgba(255, 42, 42, 0.9);
        }
        .butterfly-container.butterfly-kirmizi {
            animation: intense-glow 0.5s infinite alternate ease-in-out;
        }

        .butterfly-altin {
            --wing-color-1: #f1c40f;
            --wing-color-2: #d35400;
            --glow-color: rgba(241, 196, 15, 1);
        }
        .butterfly-container.butterfly-altin {
            animation: intense-glow 0.4s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 2px var(--glow-color)); }
            100% { filter: drop-shadow(0 0 14px var(--glow-color)); }
        }

        @keyframes intense-glow {
            0% { filter: drop-shadow(0 0 6px var(--glow-color)) brightness(1); }
            100% { filter: drop-shadow(0 0 22px var(--glow-color)) brightness(1.35); }
        }

        .catch-alert-container {
            position: fixed;
            top: var(--theme-y, 30%);
            left: var(--theme-x, 50%);
            transform: translate(-50%, -50%) scale(0.85);
            background: var(--theme-bg, rgba(10, 8, 22, 0.9));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid var(--theme-border-color, rgba(178, 102, 255, 0.4));
            border-radius: var(--theme-radius, 24px);
            padding: 24px 44px;
            color: #fff;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7), 0 0 30px var(--glow-color, rgba(178, 102, 255, 0.15));
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .catch-alert-container.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>

<body>
    <div id="havuz"></div>

    <!-- 🧩 Sandboxed Widget SDK Iframe Container -->
    <div id="developer-widget-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; display: none;">
        <iframe id="developer-widget-iframe" sandbox="allow-scripts" style="width: 100%; height: 100%; border: none; background: transparent;"></iframe>
    </div>

    <div id="catch-alert" class="catch-alert-container">
        <h2 style="font-size: 20px; font-weight: 800; margin: 0 0 10px 0; color: #fff;">🦋 KELEBEK YAKALANDI!</h2>
        <div id="catch-alert-message" style="font-size: 16px; font-weight: 600;"></div>
    </div>

    <audio id="atlama-sesi" preload="metadata" style="display: none;">
        <source id="atlama-sesi-source" src="vada.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // === AWS SERVERLESS API YAPILANDIRMASI ===
            // Artik Python proxy'ye gerek yok. Tum mesajlar dogrudan AWS uzerinden gonderilir.

            const urlParams = new URLSearchParams(window.location.search);

            // AWS Lambda API URL'leri (Sabitlendi)
            const SERVERLESS_CHANNEL_API = 'https://9zdnkqnc90.execute-api.eu-north-1.amazonaws.com/default/kick_channel';
            const SERVERLESS_CHAT_API = 'https://nbgqqa1530.execute-api.eu-north-1.amazonaws.com/default/kick_send_message';

            // Guvenlik: Bu degerler yayinciya ozeldir ve OBS URL'sine parametre olarak eklenir.
            // broadcaster_secret hicbir zaman ag uzerinden acik gonderilmez (HMAC imzalama).
            const broadcasterSecret = urlParams.get('secret') || '';
            const broadcasterUserId = urlParams.get('broadcaster_user_id') || '';

            if (!broadcasterSecret) {
                console.warn('⚠️ Yayıncı secret anahtarı (secret) URL parametresinde bulunamadı. Chat mesajları gönderilemeyecek.');
            }

            const paramUserId = urlParams.get('id');
            const paramChannelId = urlParams.get('channelid');
            const paramChannel = urlParams.get('channel'); // Serverless API'den chatroom_id bulmak için
            const paramAuth = urlParams.get('auth');
            // OAuth kullanıldığı için token parametresi artık gerekli değil

            // char, target ve sound parametrelerini al
            const paramChar = urlParams.get('char');
            const paramTarget = urlParams.get('target');
            const paramSound = urlParams.get('sound');

            // Parametre yoksa varsayılan isimleri kullan
            const charBaseName = paramChar || 'karakter';
            const targetBaseName = paramTarget || 'havuz';
            const soundBaseName = paramSound || 'vada';

            // Boyut parametreleri
            const paramPoolWidth = parseInt(urlParams.get('poolwidth')) || 300;
            const paramCharWidth = parseInt(urlParams.get('charwidth')) || 120;
            const paramEmojiCharWidth = parseInt(urlParams.get('emojicharwidth')) || 92;
            const paramGroupCharWidth = parseInt(urlParams.get('groupcharwidth')) || 90;

            const skorGosterici = document.createElement('div');
            skorGosterici.id = 'skor-gosterici';
            skorGosterici.style.position = 'fixed';
            skorGosterici.style.bottom = '10px';
            skorGosterici.style.left = '10px';
            skorGosterici.style.color = '#C8A2C8';
            skorGosterici.style.fontSize = '16px';
            skorGosterici.style.fontWeight = '500';
            skorGosterici.style.fontFamily = "'Roboto', sans-serif";
            skorGosterici.style.textShadow = '2px 2px 4px black';
            skorGosterici.style.zIndex = '100';
            skorGosterici.style.pointerEvents = 'none';
            skorGosterici.textContent = 'En Yüksek Skor: Henüz yok';
            document.body.appendChild(skorGosterici);

            // Lisans sistemi modüler ve UX dostu bir yapı için devre dışı bırakıldı.
            console.log(`✅ Hoşgeldiniz: ${paramUserId || 'Misafir'}`);

            let currentAccessToken = '';
            let dynamicAuthorizedUsers = [];
            if (paramAuth) {
                dynamicAuthorizedUsers = paramAuth.split(',')
                    .map(user => user.trim().toLowerCase())
                    .filter(user => user.length > 0);
            }
            if (paramUserId && !dynamicAuthorizedUsers.includes(paramUserId.toLowerCase())) {
                dynamicAuthorizedUsers.push(paramUserId.toLowerCase());
            }

            const havuz = document.getElementById('havuz');
            const atlamaSesi = document.getElementById('atlama-sesi');

            // Ses kaynağını URL parametresine göre ayarla
            const atlamaSesiSource = document.getElementById('atlama-sesi-source');
            atlamaSesiSource.src = `${soundBaseName}.mp3`;

            // Ses yüklenme kontrolü
            atlamaSesi.addEventListener('canplay', () => {
                console.log('✅ Ses dosyası yüklendi ve oynatılmaya hazır');
            });
            atlamaSesi.addEventListener('error', (e) => {
                console.error(`⚠️ Ses yüklenemedi: ${soundBaseName}.mp3`, e);
            });

            atlamaSesi.load(); // Sesi yeniden yükle

            // Havuzun resmini URL parametresine göre hemen ayarla
            havuz.style.backgroundImage = `url('${targetBaseName}.png')`;

            const AYARLAR = {
                kickChatroomID: paramChannelId || 0,
                // OAuth kullanıldığı için kickApiToken artık Python proxy tarafında yönetiliyor
                kickWebSocketUrl: "wss://ws-us2.pusher.com/app/32cbd69e4b950bf97679?protocol=7&client=js&version=7.6.0&flash=false",
                yetkiliListesi: dynamicAuthorizedUsers,

                sikeListesi: [],

                topluAtlamaGecikmesi: 100,
                ozelKarakterGruplari: {
                    'grup1': { resim: '1.png', kullanicilar: [] },
                    'grup2': { resim: '2.png', kullanicilar: [] },
                    'grup3': { resim: '3.png', kullanicilar: [] }
                },
                testModu: false,
                fizik: { yerCekimi: 0.05, temelHiz: 3, hizVaryasyon: 1.5, minimumAci: 15, maksimumAci: 60, minimumIvme: 0.66, maksimumIvme: 1 },
                puanlama: {
                    // YENİ: Bu değerler target boyutuna göre dinamik olarak hesaplanacak
                    basariMesafeSiniri: 150,  // Varsayılan (300 / 2)
                    puanlamaKatsayisi: 1.5   // Varsayılan (150 * 0.01)
                }
            };

            // ==========================================
            // === PAIRABOT WAL & RPG ENGINE IMPLEMENTATION ===
            // ==========================================

            // === RPG & GAME STATE ===
            const rpgProfiles = new Map();   // key: lowercase username -> profile
            const rpgRelations = new Map();  // key: "user1<>user2" -> status ("MARRIED" | "ENGAGED")
            const rpgSocial = new Map();     // key: "user1<>user2" -> { affinity, hostility }
            let underAttackMode = false;

            // 🦋 Butterfly Catching Game States
            let isButterflyActive = false;
            let activeButterfly = null; // { rarity, id, element, timeout }
            const pendingTrades = new Map(); // key: sender_lower -> { from, to, item, qty, ts, status }
            const lockedButterflies = new Map(); // key: username_lower -> { yesil, mavi, mor, altin }
            let kelebekAyarlari = {
                minSpawnSuresi: 2,
                maxSpawnSuresi: 6
            };
            let nextButterflyTimeout = null;
            
            // 🧩 Plugin Marketplace & Custom Commands State
            const activePlugins = new Set(["butterfly", "blackjack", "robbery", "trivia"]);
            const customCommands = new Map();
            const globalMarketItems = new Map();
            const disabledMarketItems = new Set();
            // Pre-load default approved items
            globalMarketItems.set("10", { id: "10", name: "Peluş", price: 500, type: "skin", file: "peluş.png", status: "approved", developer: "System" });
            globalMarketItems.set("11", { id: "11", name: "Nilüfer", price: 600, type: "skin", file: "nilüfer.png", status: "approved", developer: "System" });
            globalMarketItems.set("12", { id: "12", name: "Rakı", price: 800, type: "skin", file: "rakı.png", status: "approved", developer: "System" });
            globalMarketItems.set("13", { id: "13", name: "Çay", price: 300, type: "skin", file: "çay.png", status: "approved", developer: "System" });
            
            // Proposals for marriages and engagements
            const pendingMarriageProposals = new Map();  // key: target_lower -> { sender, ts }
            const pendingEngagementProposals = new Map(); // key: target_lower -> { sender, ts }
            
            // Trivia Game State
            let triviaActive = false;
            let triviaQuestion = null;
            let triviaAnswer = "";
            let triviaWinners = [];
            let triviaTimer = null;
            
            // Word Game State
            let wordGameActive = false;
            let wordGamePattern = "";
            let wordGameWinners = [];
            let usedWords = new Set();
            let wordGameTimer = null;
            let turkishWordsSet = new Set(); // Loaded from kelimeler.json if available

            // Cooldowns
            const commandCooldowns = new Map();
            const soygunCooldowns = new Map();
            const activeBJGames = new Map(); // username_lower -> { bet, playerHand, dealerHand, deck }

            const suits = ['♥️', '♦️', '♣️', '♠️'];
            const values = [
                { name: '2', val: 2 }, { name: '3', val: 3 }, { name: '4', val: 4 },
                { name: '5', val: 5 }, { name: '6', val: 6 }, { name: '7', val: 7 },
                { name: '8', val: 8 }, { name: '9', val: 9 }, { name: '10', val: 10 },
                { name: 'J', val: 10 }, { name: 'Q', val: 10 }, { name: 'K', val: 10 },
                { name: 'A', val: 11 }
            ];

            function createDeck() {
                const deck = [];
                for (const suit of suits) {
                    for (const v of values) {
                        deck.push({ name: v.name, suit, val: v.val });
                    }
                }
                for (let i = deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [deck[i], deck[j]] = [deck[j], deck[i]];
                }
                return deck;
            }

            function getHandTotal(hand) {
                let total = 0;
                let aces = 0;
                for (const card of hand) {
                    total += card.val;
                    if (card.name === 'A') aces++;
                }
                while (total > 21 && aces > 0) {
                    total -= 10;
                    aces--;
                }
                return total;
            }

            function handToString(hand) {
                return hand.map(c => `[${c.name}${c.suit}]`).join(', ');
            }

            // Load kelimeler.json if it exists
            async function loadWordDatabase() {
                try {
                    const response = await fetch('kelimeler.json');
                    if (response.ok) {
                        const words = await response.json();
                        if (Array.isArray(words)) {
                            turkishWordsSet = new Set(words.map(w => w.trim().toLowerCase()));
                            console.log(`📚 Kelime veri tabanı yüklendi. Toplam ${turkishWordsSet.size} kelime.`);
                        }
                    }
                } catch (e) {
                    console.log("ℹ️ Kelime veri tabanı (kelimeler.json) bulunamadı. Kelime oyunu için temel kontrol kullanılacak.");
                }
            }
            loadWordDatabase();

            // --- WIDGET HELPER FUNCTIONS ---
            const widget = document.createElement('div');
            widget.id = 'game-widget';
            widget.className = 'widget-container';
            widget.innerHTML = `
                <div class="widget-header">
                    <span id="widget-title" class="widget-title">Oyun</span>
                    <span id="widget-timer" class="widget-timer">30s</span>
                </div>
                <div id="widget-body" class="widget-body"></div>
                <div id="widget-footer" class="widget-stats"></div>
            `;
            document.body.appendChild(widget);

            function showWidget(title, bodyHtml, timerVal, footerText = '') {
                document.getElementById('widget-title').textContent = title;
                document.getElementById('widget-timer').textContent = `${timerVal}s`;
                document.getElementById('widget-body').innerHTML = bodyHtml;
                document.getElementById('widget-footer').textContent = footerText;
                widget.classList.add('active');
            }

            function updateWidgetTimer(val) {
                const timerEl = document.getElementById('widget-timer');
                if (timerEl) timerEl.textContent = `${val}s`;
            }

            function updateWidgetFooter(text) {
                const footerEl = document.getElementById('widget-footer');
                if (footerEl) footerEl.textContent = text;
            }

            function hideWidget() {
                widget.classList.remove('active');
            }

            // --- RPG UTILS ---
            function getOrCreateProfile(username) {
                const key = username.toLowerCase();
                if (!rpgProfiles.has(key)) {
                    rpgProfiles.set(key, {
                        username: username,
                        puan: 0,
                        seviye: 1,
                        envanter: [],
                        health: 100,
                        lastJump: 0,
                        kelebekler: { yesil: 0, gumus: 0, mavi: 0, mor: 0, kirmizi: 0, altin: 0, kozmik: 0 }
                    });
                }
                return rpgProfiles.get(key);
            }

            function getRelationshipKey(user1, user2) {
                return [user1.toLowerCase(), user2.toLowerCase()].sort().join("<>");
            }

            function getMarriedPartner(username) {
                const keyLower = username.toLowerCase();
                for (const [key, val] of rpgRelations.entries()) {
                    if (val === "MARRIED") {
                        const parts = key.split("<>");
                        if (parts[0] === keyLower) return parts[1];
                        if (parts[1] === keyLower) return parts[0];
                    }
                }
                return null;
            }

            function getEngagedPartner(username) {
                const keyLower = username.toLowerCase();
                for (const [key, val] of rpgRelations.entries()) {
                    if (val === "ENGAGED") {
                        const parts = key.split("<>");
                        if (parts[0] === keyLower) return parts[1];
                        if (parts[1] === keyLower) return parts[0];
                    }
                }
                return null;
            }

            function isAllCaps(text) {
                const letters = text.replace(/[^a-zA-ZğüşıöçĞÜŞİÖÇ]/g, '');
                if (letters.length < 5) return false;
                return letters === letters.toUpperCase();
            }

            function checkCommandCooldown(username, command) {
                const key = `${username.toLowerCase()}:${command.toLowerCase()}`;
                const now = Date.now();
                const lastTime = commandCooldowns.get(key) || 0;
                if (now - lastTime < 5000) {
                    return false;
                }
                commandCooldowns.set(key, now);
                return true;
            }

            // --- WAL DB REPLAY HANDLER ---
            function handleIncomingWALEvent(event, isReplaying = false) {
                if (!event || !event.type) return;

                switch (event.type) {
                    case "SCORE": {
                        const { user, score } = event;
                        const currentBest = enIyiSkorlarMap.get(user) || 0;
                        if (score > currentBest) {
                            enIyiSkorlarMap.set(user, score);
                        }
                        sonSkorlar.unshift({ username: user, score: score });
                        if (sonSkorlar.length > 10) sonSkorlar.pop();
                        break;
                    }
                    case "RPG_POINT_CHANGE": {
                        const { user, amount } = event;
                        const changeAmount = Number(amount);
                        if (!isNaN(changeAmount)) {
                            const profile = getOrCreateProfile(user);
                            profile.puan = Math.max(0, profile.puan + changeAmount);
                            
                            let needed = profile.seviye * 100;
                            while (profile.puan >= needed) {
                                profile.puan -= needed;
                                profile.seviye += 1;
                                needed = profile.seviye * 100;
                                if (!isReplaying) {
                                    sendChatMessageToKick(`🎉 @${user} seviye atladı! Yeni Seviye: ${profile.seviye}!`);
                                }
                            }
                        }
                        break;
                    }
                    case "RPG_INVENTORY": {
                        const { user, item, action } = event;
                        const profile = getOrCreateProfile(user);
                        if (action === "ADD") {
                            profile.envanter.push(item);
                        } else if (action === "REMOVE") {
                            const idx = profile.envanter.indexOf(item);
                            if (idx !== -1) {
                                profile.envanter.splice(idx, 1);
                            }
                        }
                        break;
                    }
                    case "RPG_RELATION": {
                        const { user1, user2, status } = event;
                        const key = getRelationshipKey(user1, user2);
                        if (status === "NONE") {
                            rpgRelations.delete(key);
                        } else {
                            rpgRelations.set(key, status);
                        }
                        break;
                    }
                    case "RPG_HEALTH": {
                        const { user, health } = event;
                        const profile = getOrCreateProfile(user);
                        const parsedHealth = Number(health);
                        profile.health = Math.max(0, Math.min(100, isNaN(parsedHealth) ? 100 : parsedHealth));
                        break;
                    }
                    case "RPG_SOCIAL": {
                        const { user1, user2, affinity, hostility } = event;
                        const key = getRelationshipKey(user1, user2);
                        if (!rpgSocial.has(key)) {
                            rpgSocial.set(key, { affinity: 0, hostility: 0 });
                        }
                        const s = rpgSocial.get(key);
                        s.affinity = Math.max(0, s.affinity + (affinity || 0));
                        s.hostility = Math.max(0, s.hostility + (hostility || 0));
                        break;
                    }
                    case "UNDER_ATTACK": {
                        underAttackMode = event.active;
                        break;
                    }
                    case "CATCH_BUTTERFLY": {
                        const { user, rarity } = event;
                        const profile = getOrCreateProfile(user);
                        if (!profile.kelebekler) {
                            profile.kelebekler = { yesil: 0, gumus: 0, mavi: 0, mor: 0, kirmizi: 0, altin: 0, kozmik: 0 };
                        }
                        profile.kelebekler[rarity] = (profile.kelebekler[rarity] || 0) + 1;
                        break;
                    }
                    case "SELL_BUTTERFLY": {
                        const { user, rarity, qty } = event;
                        const profile = getOrCreateProfile(user);
                        if (!profile.kelebekler) {
                            profile.kelebekler = { yesil: 0, gumus: 0, mavi: 0, mor: 0, kirmizi: 0, altin: 0, kozmik: 0 };
                        }
                        const sellQty = Number(qty) || 1;
                        profile.kelebekler[rarity] = Math.max(0, (profile.kelebekler[rarity] || 0) - sellQty);
                        break;
                    }
                    case "TRADE_BUTTERFLY": {
                        const { from, to, rarity, qty } = event;
                        const profileFrom = getOrCreateProfile(from);
                        const profileTo = getOrCreateProfile(to);
                        if (!profileFrom.kelebekler) profileFrom.kelebekler = { yesil: 0, gumus: 0, mavi: 0, mor: 0, kirmizi: 0, altin: 0, kozmik: 0 };
                        if (!profileTo.kelebekler) profileTo.kelebekler = { yesil: 0, gumus: 0, mavi: 0, mor: 0, kirmizi: 0, altin: 0, kozmik: 0 };
                        const tradeQty = Number(qty) || 1;
                        profileFrom.kelebekler[rarity] = Math.max(0, (profileFrom.kelebekler[rarity] || 0) - tradeQty);
                        profileTo.kelebekler[rarity] = (profileTo.kelebekler[rarity] || 0) + tradeQty;
                        break;
                    }
                    case "CRAFT_BUTTERFLY": {
                        const { user } = event;
                        const profile = getOrCreateProfile(user);
                        if (!profile.kelebekler) {
                            profile.kelebekler = { yesil: 0, gumus: 0, mavi: 0, mor: 0, kirmizi: 0, altin: 0, kozmik: 0 };
                        }
                        profile.kelebekler.yesil = Math.max(0, (profile.kelebekler.yesil || 0) - 1);
                        profile.kelebekler.gumus = Math.max(0, (profile.kelebekler.gumus || 0) - 1);
                        profile.kelebekler.mavi = Math.max(0, (profile.kelebekler.mavi || 0) - 1);
                        profile.kelebekler.mor = Math.max(0, (profile.kelebekler.mor || 0) - 1);
                        profile.kelebekler.kirmizi = Math.max(0, (profile.kelebekler.kirmizi || 0) - 1);
                        profile.kelebekler.altin = Math.max(0, (profile.kelebekler.altin || 0) - 1);
                        profile.kelebekler.kozmik = (profile.kelebekler.kozmik || 0) + 1;
                        break;
                    }
                    case "UPDATE_BUTTERFLY_SETTINGS": {
                        const { minTime, maxTime } = event;
                        kelebekAyarlari.minSpawnSuresi = Number(minTime) || 2;
                        kelebekAyarlari.maxSpawnSuresi = Number(maxTime) || 6;
                        console.log(`🦋 Kelebek belirme süreleri güncellendi: ${kelebekAyarlari.minSpawnSuresi} - ${kelebekAyarlari.maxSpawnSuresi} dk.`);
                        break;
                    }
                    case "TOGGLE_PLUGIN": {
                        const { pluginId, enabled } = event;
                        if (enabled) {
                            activePlugins.add(pluginId);
                            console.log(`🧩 Eklenti aktif edildi: ${pluginId}`);
                            if (pluginId === 'butterfly' && !isReplaying) {
                                scheduleNextButterfly();
                            }
                        } else {
                            activePlugins.delete(pluginId);
                            console.log(`🧩 Eklenti devredışı bırakıldı: ${pluginId}`);
                            if (pluginId === 'butterfly') {
                                if (isButterflyActive && activeButterfly) {
                                    const container = activeButterfly.element;
                                    if (container && container.parentNode) {
                                        container.parentNode.removeChild(container);
                                    }
                                    if (activeButterfly.timeout) clearTimeout(activeButterfly.timeout);
                                    isButterflyActive = false;
                                    activeButterfly = null;
                                }
                                if (nextButterflyTimeout) clearTimeout(nextButterflyTimeout);
                            }
                        }
                        break;
                    }
                    case "CREATE_CUSTOM_COMMAND": {
                        const { name, response } = event;
                        const cmdKey = name.startsWith('!') ? name.trim().toLowerCase() : '!' + name.trim().toLowerCase();
                        customCommands.set(cmdKey, response);
                        console.log(`💬 Özel komut oluşturuldu/güncellendi: ${cmdKey}`);
                        break;
                    }
                    case "DELETE_CUSTOM_COMMAND": {
                        const { name } = event;
                        const cmdKey = name.startsWith('!') ? name.trim().toLowerCase() : '!' + name.trim().toLowerCase();
                        customCommands.delete(cmdKey);
                        console.log(`💬 Özel komut silindi: ${cmdKey}`);
                        break;
                    }
                    case "INSTALL_MARKET_ITEM": {
                        const { itemId, itemType, config } = event;
                        console.log(`🛒 Pazar yeri ürünü yüklendi: ${itemId} (${itemType})`);
                        if (itemType === "widget") {
                            const iframe = document.getElementById('developer-widget-iframe');
                            const container = document.getElementById('developer-widget-container');
                            if (iframe && container) {
                                if (config && config.html) {
                                    container.style.display = 'block';
                                    iframe.srcdoc = config.html;
                                    console.log(`📺 Sandbox iframe yüklendi: ${itemId}`);
                                } else {
                                    const cachedItem = globalMarketItems.get(String(itemId));
                                    if (cachedItem && cachedItem.content) {
                                        container.style.display = 'block';
                                        iframe.srcdoc = cachedItem.content;
                                        console.log(`📺 Sandbox iframe yüklendi (katalogdan): ${itemId}`);
                                    } else {
                                        container.style.display = 'none';
                                        iframe.srcdoc = '';
                                    }
                                }
                            }
                        } else if (itemType === "theme") {
                            let styles = null;
                            if (config && config.styles) {
                                styles = config.styles;
                            } else {
                                const cachedItem = globalMarketItems.get(String(itemId));
                                if (cachedItem && cachedItem.content) {
                                    try {
                                        const parsed = typeof cachedItem.content === 'string' ? JSON.parse(cachedItem.content) : cachedItem.content;
                                        if (parsed && typeof parsed === 'object') {
                                            styles = parsed.styles || parsed;
                                        }
                                    } catch (e) {
                                        console.warn("Failed to parse theme styles from catalog:", e);
                                    }
                                }
                            }

                            if (styles && typeof styles === 'object') {
                                for (const [key, val] of Object.entries(styles)) {
                                    let safeVal = val;
                                    if (typeof val === 'number' || (typeof val === 'string' && /^\d+$/.test(val))) {
                                        if (['x', 'y', 'radius', 'width', 'height', 'top', 'left', 'right', 'bottom'].includes(key)) {
                                            safeVal = val + 'px';
                                        }
                                    }
                                    document.documentElement.style.setProperty(`--theme-${key}`, safeVal);
                                }
                                console.log(`🎨 Tema stilleri güncellendi:`, styles);
                            }
                        }
                        break;
                    }
                    case "EQUIP_SKIN": {
                        const { user, skinName } = event;
                        const profile = getOrCreateProfile(user);
                        profile.equippedSkin = skinName;
                        console.log(`🎒 @${user} görünümünü kuşandı: ${skinName}`);
                        break;
                    }
                    case "DEVELOPER_SUBMIT_ITEM": {
                        const { id, itemType, name, price, content, developer, status } = event;
                        globalMarketItems.set(String(id), {
                            id: String(id),
                            type: itemType,
                            name: name,
                            price: Number(price) || 0,
                            content: content,
                            developer: developer,
                            status: status || "pending"
                        });
                        console.log(`💻 Geliştirici ürünü gönderildi: [${id}] ${name} (${itemType})`);
                        break;
                    }
                    case "ADMIN_APPROVE_ITEM": {
                        const { id, status } = event;
                        const item = globalMarketItems.get(String(id));
                        if (item) {
                            item.status = status;
                            console.log(`🔑 Yönetici kararı [${id}]: ${status}`);
                            
                            if (status === 'approved' && !isReplaying) {
                                if (item.type === 'widget') {
                                    const iframe = document.getElementById('developer-widget-iframe');
                                    const container = document.getElementById('developer-widget-container');
                                    if (iframe && container && item.content) {
                                        container.style.display = 'block';
                                        iframe.srcdoc = item.content;
                                    }
                                } else if (item.type === 'theme') {
                                    try {
                                        const configObj = typeof item.content === 'string' ? JSON.parse(item.content) : item.content;
                                        if (configObj && configObj.styles && typeof configObj.styles === 'object') {
                                            for (const [key, val] of Object.entries(configObj.styles)) {
                                                 let safeVal = val;
                                                 if (typeof val === 'number' || (typeof val === 'string' && /^\d+$/.test(val))) {
                                                     if (['x', 'y', 'radius', 'width', 'height', 'top', 'left', 'right', 'bottom'].includes(key)) {
                                                         safeVal = val + 'px';
                                                     }
                                                 }
                                                 document.documentElement.style.setProperty(`--theme-${key}`, safeVal);
                                            }
                                        }
                                    } catch (e) {
                                        console.warn("Could not apply style content directly:", e);
                                    }
                                }
                            }
                        }
                        break;
                    }
                    case "TOGGLE_MARKET_ITEM": {
                        const { itemId, enabled } = event;
                        if (enabled === false) {
                            disabledMarketItems.add(String(itemId));
                            console.log(`❌ Ürün kanal düzeyinde devre dışı bırakıldı: ${itemId}`);
                        } else {
                            disabledMarketItems.delete(String(itemId));
                            console.log(`✅ Ürün kanal düzeyinde aktif edildi: ${itemId}`);
                        }
                        break;
                    }
                }

                // Send event to developer sandbox widget
                sendEventToSandboxWidget({ event: 'wal', payload: event });

                if (!isReplaying) {
                    updateGlobalLeaderboardUI();
                }
            }

            function sendEventToSandboxWidget(eventPayload) {
                const iframe = document.getElementById('developer-widget-iframe');
                if (iframe && iframe.contentWindow) {
                    try {
                        const rawPayload = eventPayload.payload;
                        if (!rawPayload || !['SCORE', 'CATCH_BUTTERFLY'].includes(rawPayload.type)) {
                            return;
                        }
                        const safePayload = {
                            type: rawPayload.type,
                            user: rawPayload.user,
                            score: rawPayload.score || 0,
                            rarity: rawPayload.rarity || ''
                        };
                        iframe.contentWindow.postMessage({ event: 'wal', payload: safePayload }, '*');
                    } catch (e) {
                        console.warn("PostMessage failed:", e);
                    }
                }
            }

            function updateGlobalLeaderboardUI() {
                let genelEnIyiSkor = 0;
                let genelEnIyiKullanici = '';
                for (const [user, score] of enIyiSkorlarMap.entries()) {
                    if (score > genelEnIyiSkor) {
                        genelEnIyiSkor = score;
                        genelEnIyiKullanici = user;
                    }
                }
                if (genelEnIyiKullanici) {
                    skorGosterici.textContent = `En Yüksek Skor: ${genelEnIyiKullanici} - ${genelEnIyiSkor.toFixed(0)}`;
                }
            }

            class PairaWAL {
                constructor() {
                    this.dbName = "PairaBotDB";
                    this.storeName = "wal_logs";
                    this.opfsFileName = "paira_wal.log";
                    this.fileHandle = null;
                    this.opfsFileHandle = null;
                    this.db = null;
                    this.storageType = "none";
                    this.syncChannel = new BroadcastChannel("paira_wal_sync");
                    this.mutexChannel = new BroadcastChannel("paira_wal_mutex");
                    this.writeQueue = Promise.resolve();
                    
                    this.contextId = "ctx_obs_" + Math.random().toString(36).substring(2, 11);
                    this.isWriter = false;
                    this.pendingRequests = new Map(); // reqId -> { resolve, reject, timeout }
                }

                async init() {
                    await this.initIndexedDB();

                    try {
                        const headers = { 'Content-Type': 'application/json' };
                        const action = "list_market_items";
                        
                        if (broadcasterSecret && paramUserId) {
                            try {
                                const timestamp = Math.floor(Date.now() / 1000).toString();
                                const payload = `${paramUserId}:${timestamp}:${action}`;
                                const encoder = new TextEncoder();
                                const keyData = encoder.encode(broadcasterSecret);
                                const msgData = encoder.encode(payload);

                                const cryptoKey = await crypto.subtle.importKey(
                                    'raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
                                );
                                const signatureBuffer = await crypto.subtle.sign('HMAC', cryptoKey, msgData);
                                const signature = Array.from(new Uint8Array(signatureBuffer))
                                    .map(b => b.toString(16).padStart(2, '0')).join('');

                                headers['X-Signature'] = signature;
                                headers['X-Timestamp'] = timestamp;
                                headers['X-User-Id'] = paramUserId;
                            } catch (signErr) {
                                console.error("OBS failed to sign catalog request:", signErr);
                            }
                        }

                        const response = await fetch(SERVERLESS_CHAT_API, {
                            method: 'POST',
                            headers,
                            body: JSON.stringify({ action })
                        });
                        if (response.ok) {
                            const resData = await response.json();
                            if (resData && resData.success && Array.isArray(resData.items)) {
                                for (const item of resData.items) {
                                    globalMarketItems.set(String(item.id), item);
                                }
                                console.log(`🛒 Pazar yeri kataloğu buluttan başarıyla yüklendi: ${resData.items.length} ürün.`);
                            }
                        }
                    } catch (e) {
                        console.warn("Pazar yeri buluttan yüklenemedi, varsayılanlar kullanılacak:", e);
                    }

                    // Determine storage systems
                    try {
                        const storedHandle = await this.getStoredFileHandle();
                        if (storedHandle) {
                            const opts = { mode: 'readwrite' };
                            if ((await storedHandle.queryPermission(opts)) === 'granted') {
                                this.fileHandle = storedHandle;
                                this.storageType = "file";
                                console.log("📝 WAL using Local File System.");
                            }
                        }
                    } catch (e) {
                        console.warn("File System Access API query failed in OBS:", e);
                    }

                    if (this.storageType === "none") {
                        try {
                            if (navigator.storage && navigator.storage.getDirectory) {
                                const root = await navigator.storage.getDirectory();
                                this.opfsFileHandle = await root.getFileHandle(this.opfsFileName, { create: true });
                                this.storageType = "opfs";
                                console.log("📝 WAL using OPFS.");
                            }
                        } catch (e) {
                            console.warn("OPFS setup failed in OBS:", e);
                        }
                    }

                    if (this.storageType === "none") {
                        this.storageType = "idb";
                        console.log("📝 WAL using IndexedDB.");
                    }

                    // Initialize Mutex listeners
                    this.mutexChannel.onmessage = (event) => {
                        const msg = event.data;
                        if (!msg) return;

                        if (msg.type === "MUTEX_PING") {
                            if (this.isWriter) {
                                this.mutexChannel.postMessage({
                                    type: "MUTEX_PONG",
                                    senderId: this.contextId
                                });
                            }
                        } else if (msg.type === "MUTEX_PONG") {
                            if (this.pingTimeout) {
                                clearTimeout(this.pingTimeout);
                                this.pingResolve(false);
                            }
                        } else if (msg.type === "MUTEX_CLAIM") {
                            if (msg.senderId !== this.contextId) {
                                if (this.isWriter) {
                                    if (msg.senderId < this.contextId) {
                                        console.log(`📢 Mutex conflict! Relinquishing lock to smaller context ID: ${msg.senderId}`);
                                        this.isWriter = false;
                                    } else {
                                        console.log(`📢 Mutex conflict! Keeping lock over larger context ID: ${msg.senderId}`);
                                        this.mutexChannel.postMessage({
                                            type: "MUTEX_CLAIM",
                                            senderId: this.contextId
                                        });
                                    }
                                } else {
                                    console.log(`📢 Mutex claimed by another context: ${msg.senderId}`);
                                    this.isWriter = false;
                                }
                            }
                        } else if (msg.type === "WAL_WRITE_REQUEST") {
                            if (this.isWriter) {
                                console.log(`📥 OBS received write request from ${msg.senderId} (reqId: ${msg.reqId})`);
                                this.append({
                                    ...msg.payload,
                                    _reqId: msg.reqId,
                                    _senderId: msg.senderId
                                });
                            }
                        }
                    };

                    this.syncChannel.onmessage = (event) => {
                        const msg = event.data;
                        if (msg && msg.type === "WAL_APPEND") {
                            const payload = msg.payload;
                            
                            // Check if this matches a pending write request from this context
                            if (payload._senderId === this.contextId && payload._reqId) {
                                const pending = this.pendingRequests.get(payload._reqId);
                                if (pending) {
                                    clearTimeout(pending.timeout);
                                    pending.resolve(payload);
                                    this.pendingRequests.delete(payload._reqId);
                                }
                            }

                            // Reader context catches up by replaying
                            if (!this.isWriter) {
                                handleIncomingWALEvent(payload, false);
                            }
                        }
                    };

                    // Run election
                    const claimed = await this.runElection();
                    if (claimed) {
                        this.isWriter = true;
                        this.mutexChannel.postMessage({
                            type: "MUTEX_CLAIM",
                            senderId: this.contextId
                        });
                        console.log("👑 Mutex acquired. OBS overlay is the Active Writer.");
                    } else {
                        console.log("👥 Mutex denied. OBS overlay is a Reader.");
                    }

                    const logs = await this.readAll();
                    console.log(`Replaying ${logs.length} WAL log entries...`);
                    for (const log of logs) {
                        handleIncomingWALEvent(log, true);
                    }
                    updateGlobalLeaderboardUI();
                }

                runElection() {
                    return new Promise((resolve) => {
                        this.pingResolve = resolve;
                        this.mutexChannel.postMessage({
                            type: "MUTEX_PING",
                            senderId: this.contextId
                        });
                        this.pingTimeout = setTimeout(() => {
                            resolve(true); // No response, claim lock
                        }, 400);
                    });
                }

                async initIndexedDB() {
                    return new Promise((resolve, reject) => {
                        const request = indexedDB.open(this.dbName, 1);
                        request.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if (!db.objectStoreNames.contains(this.storeName)) {
                                db.createObjectStore(this.storeName, { keyPath: "id", autoIncrement: true });
                            }
                            if (!db.objectStoreNames.contains("settings")) {
                                db.createObjectStore("settings");
                            }
                        };
                        request.onsuccess = (e) => {
                            this.db = e.target.result;
                            resolve();
                        };
                        request.onerror = (e) => reject(e);
                    });
                }

                async getStoredFileHandle() {
                    return new Promise((resolve) => {
                        if (!this.db) return resolve(null);
                        const tx = this.db.transaction("settings", "readonly");
                        const store = tx.objectStore("settings");
                        const req = store.get("file_handle");
                        req.onsuccess = () => resolve(req.result || null);
                        req.onerror = () => resolve(null);
                    });
                }

                async storeFileHandle(handle) {
                    return new Promise((resolve) => {
                        if (!this.db) return resolve();
                        const tx = this.db.transaction("settings", "readwrite");
                        const store = tx.objectStore("settings");
                        const req = store.put(handle, "file_handle");
                        req.onsuccess = () => resolve();
                        req.onerror = () => resolve();
                    });
                }

                async append(payload) {
                    if (this.isWriter) {
                        this.writeQueue = this.writeQueue.then(async () => {
                            return await this._executeAppend(payload);
                        }).catch(err => {
                            console.error("WAL append serialization queue error in OBS:", err);
                        });
                        return this.writeQueue;
                    } else {
                        // Delegate write to active writer context
                        return new Promise((resolve, reject) => {
                            const reqId = "req_" + Math.random().toString(36).substring(2, 11);
                            
                            const timeout = setTimeout(async () => {
                                console.warn(`⏰ Write request timed out (reqId: ${reqId}). OBS claiming lock.`);
                                this.pendingRequests.delete(reqId);
                                
                                this.isWriter = true;
                                this.mutexChannel.postMessage({
                                    type: "MUTEX_CLAIM",
                                    senderId: this.contextId
                                });
                                try {
                                    const entry = await this.append(payload);
                                    resolve(entry);
                                } catch (e) {
                                    reject(e);
                                }
                            }, 1000);

                            this.pendingRequests.set(reqId, { resolve, reject, timeout });
                            
                            this.mutexChannel.postMessage({
                                type: "WAL_WRITE_REQUEST",
                                senderId: this.contextId,
                                reqId: reqId,
                                payload: payload
                            });
                        });
                    }
                }

                async _executeAppend(payload) {
                    const logEntry = {
                        ...payload,
                        ts: Date.now()
                    };

                    if (this.storageType === "file" && this.fileHandle) {
                        try {
                            const file = await this.fileHandle.getFile();
                            const writable = await this.fileHandle.createWritable({ keepExistingData: true });
                            await writable.seek(file.size);
                            await writable.write(JSON.stringify(logEntry) + "\n");
                            await writable.close();
                        } catch (e) {
                            try {
                                const file = await this.fileHandle.getFile();
                                const text = await file.text();
                                const writable = await this.fileHandle.createWritable();
                                await writable.write(text + JSON.stringify(logEntry) + "\n");
                                await writable.close();
                            } catch (err) {
                                console.error("Error writing file in OBS, fallback to IDB:", err);
                                await this.writeToIDB(logEntry);
                            }
                        }
                    } else if (this.storageType === "opfs" && this.opfsFileHandle) {
                        try {
                            const file = await this.opfsFileHandle.getFile();
                            const writable = await this.opfsFileHandle.createWritable({ keepExistingData: true });
                            await writable.seek(file.size);
                            await writable.write(JSON.stringify(logEntry) + "\n");
                            await writable.close();
                        } catch (e) {
                            try {
                                const file = await this.opfsFileHandle.getFile();
                                const text = await file.text();
                                const writable = await this.opfsFileHandle.createWritable();
                                await writable.write(text + JSON.stringify(logEntry) + "\n");
                                await writable.close();
                            } catch (err) {
                                console.error("Error writing OPFS in OBS, fallback to IDB:", err);
                                await this.writeToIDB(logEntry);
                            }
                        }
                    } else {
                        await this.writeToIDB(logEntry);
                    }

                    // Directly execute locally
                    handleIncomingWALEvent(logEntry, false);

                    // Broadcast
                    this.syncChannel.postMessage({
                        type: "WAL_APPEND",
                        payload: logEntry
                    });

                    return logEntry;
                }

                async writeToIDB(logEntry) {
                    return new Promise((resolve) => {
                        if (!this.db) return resolve();
                        const tx = this.db.transaction(this.storeName, "readwrite");
                        const store = tx.objectStore(this.storeName);
                        store.add({ data: JSON.stringify(logEntry) });
                        tx.oncomplete = () => resolve();
                        tx.onerror = tx.onabort = () => {
                            console.error("IndexedDB write failed in OBS");
                            resolve();
                        };
                    });
                }

                async readAll() {
                    const logs = [];
                    if (this.storageType === "file" && this.fileHandle) {
                        try {
                            const file = await this.fileHandle.getFile();
                            const text = await file.text();
                            const lines = text.split("\n");
                            for (const line of lines) {
                                if (line.trim()) {
                                    try {
                                        logs.push(JSON.parse(line));
                                    } catch (err) {
                                        console.warn("Skipping corrupt WAL line:", line, err);
                                    }
                                }
                            }
                            return logs;
                        } catch (e) {
                            console.error("Error reading file WAL in OBS:", e);
                        }
                    }

                    if (this.storageType === "opfs" && this.opfsFileHandle) {
                        try {
                            const file = await this.opfsFileHandle.getFile();
                            const text = await file.text();
                            const lines = text.split("\n");
                            for (const line of lines) {
                                if (line.trim()) {
                                    try {
                                        logs.push(JSON.parse(line));
                                    } catch (err) {
                                        console.warn("Skipping corrupt OPFS line:", line, err);
                                    }
                                }
                            }
                            return logs;
                        } catch (e) {
                            console.error("Error reading OPFS WAL in OBS:", e);
                        }
                    }

                    return new Promise((resolve) => {
                        if (!this.db) return resolve([]);
                        const tx = this.db.transaction(this.storeName, "readonly");
                        const store = tx.objectStore(this.storeName);
                        const req = store.getAll();
                        req.onsuccess = () => {
                            const results = req.result || [];
                            const parsed = [];
                            for (const r of results) {
                                try {
                                    parsed.push(JSON.parse(r.data));
                                } catch (err) {
                                    console.warn("Skipping corrupt IndexedDB WAL entry:", r, err);
                                }
                            }
                            resolve(parsed);
                        };
                        req.onerror = () => resolve([]);
                    });
                }

                        let t = Math.min(gecenSure / sikeAtlamaSuresi, 1.0);
                        const eased_t = easeInOutCubic(t);

                        const currentDistance = totalDistance * eased_t;

                        let currentX, currentY;

                        if (currentDistance <= dist_AP1) {
                            const segment_t = (dist_AP1 === 0) ? 1.0 : currentDistance / dist_AP1;
                            currentX = lerp(A.x, P1.x, segment_t);
                            currentY = lerp(A.y, P1.y, segment_t);
                        } else if (currentDistance <= dist_AP1 + dist_P1P2) {
                            const segment_t = (dist_P1P2 === 0) ? 1.0 : (currentDistance - dist_AP1) / dist_P1P2;
                            currentX = lerp(P1.x, P2.x, segment_t);
                            currentY = lerp(P1.y, P2.y, segment_t);
                        } else {
                            const segment_t = (dist_P2B === 0) ? 1.0 : (currentDistance - dist_AP1 - dist_P1P2) / dist_P2B;
                            currentX = lerp(P2.x, B.x, segment_t);
                            currentY = lerp(P2.y, B.y, segment_t);

                                }, 300);
                            }, beklemeSuresi);
                            return;
                        }
                        requestAnimationFrame(sikeAnimasyon);

                let sonFrameZamani = 0;

                    x = mevcutPozisyon.x;
                    y = mevcutPozisyon.y;

                    vy = mevcutPozisyon.vy;

                    const deltaTime = elapsed / 16.67;
                    vy += yerCekimi * deltaTime;
                    const ivme = mevcutPozisyon.yatayIvme || 0;
                    if (vx > 0) { vx += ivme * deltaTime; } else if (vx < 0) { vx -= ivme * deltaTime; }
                    x += vx * deltaTime;

                    const sinirliHiz = hizSinirla(vx, vy, maksimumYatayHiz, maksimumDikeyHiz);

                            const benimMerkezX = x + karakterGenisligi / 2;
                            const digerMerkezX = digerPozisyon.x + karakterGenisligi / 2;
                            const benimMerkezY = y + karakterYuksekligi / 2;
                            const digerMerkezY = digerPozisyon.y + karakterYuksekligi / 2;
                            const farkX = benimMerkezX - digerMerkezX;
                            const farkY = benimMerkezY - digerMerkezY;
                            const mesafe = Math.sqrt(farkX * farkX + farkY * farkY);

                            if (mesafe < 0.1) {
                                const rastgeleAci = Math.random() * Math.PI * 2;
                                const itmeGucu = 3.0;
                                x += Math.cos(rastgeleAci) * itmeGucu;
                                y += Math.sin(rastgeleAci) * itmeGucu;
                            }

                            const toplamYariGenislik = (karakterGenisligi / 2) + ((digerPozisyon.genislik || digerPozisyon.karakter.clientWidth) / 2);
                            const toplamYariYukseklik = (karakterYuksekligi / 2) + ((digerPozisyon.yukseklik || digerPozisyon.karakter.clientHeight) / 2);
                            const overlapX = toplamYariGenislik - Math.abs(farkX);
                            const overlapY = toplamYariYukseklik - Math.abs(farkY);

                            const elastikiyet = 0.8;
                            const surtunme = 0.98;

                            if (overlapX < overlapY) {
                                const itmeMiktari = (overlapX / 2) + 2.0;
                                if (farkX > 0) {
                                    x += itmeMiktari;
                                    digerPozisyon.x -= itmeMiktari;
                                } else {
                                    x -= itmeMiktari;
                                    digerPozisyon.x += itmeMiktari;
                                }

                                const toplamKutle = 2;
                                const benimYeniVx = ((vx * (1 - elastikiyet) + digerPozisyon.vx * (1 + elastikiyet)) / toplamKutle) * surtunme;
                                const digerYeniVx = ((digerPozisyon.vx * (1 - elastikiyet) + vx * (1 + elastikiyet)) / toplamKutle) * surtunme;

                                vx = benimYeniVx;
                                digerPozisyon.vx = digerYeniVx;

                                const itmeHizi = 0.5 * ortalamaOran;
                                if (farkX > 0) {
                                    vx += itmeHizi;
                                    digerPozisyon.vx -= itmeHizi;
                                } else {
                                    vx -= itmeHizi;
                                    digerPozisyon.vx += itmeHizi;
                                }
                            } else {
                                const itmeMiktari = (overlapY / 2) + 2.0;
                                if (farkY > 0) {
                                    y += itmeMiktari;
                                    digerPozisyon.y -= itmeMiktari;
                                } else {
                                    y -= itmeMiktari;
                                    digerPozisyon.y += itmeMiktari;
                                }

                                const toplamKutle = 2;
                                const benimYeniVy = ((vy * (1 - elastikiyet) + digerPozisyon.vy * (1 + elastikiyet)) / toplamKutle) * surtunme;
                                const digerYeniVy = ((digerPozisyon.vy * (1 - elastikiyet) + vy * (1 + elastikiyet)) / toplamKutle) * surtunme;

                                vy = benimYeniVy;
                                digerPozisyon.vy = digerYeniVy;

                                const itmeHizi = 0.3 * ortalamaOran;

                                    digerPozisyon.vy += itmeHizi;

                            }

                            mevcutPozisyon.sonCarpismaZamani = mevcutZaman;
                            mevcutPozisyon.sonCarpismaKullanici = digerKullanici;

                            digerPozisyon.vx = digerSinirliHiz.vx;
                            digerPozisyon.vy = digerSinirliHiz.vy;
                        }
                    }
                    mevcutPozisyon.x = x;
                    mevcutPozisyon.y = y;
                    mevcutPozisyon.vx = vx;
                    mevcutPozisyon.vy = vy;
                    karakter.style.transform = `translate3d(${Math.round(x)}px, ${Math.round(y)}px, 0)`;

                    if (y + karakterYuksekligi >= guncelYukseklik) {

                        karakter.style.transform = `translate3d(${Math.round(x)}px, ${Math.round(y)}px, 0)`;
                        vy = 0;
                        vx = 0;
                        let basariliAtlayis = false;

                            const havuzWidth = parseInt(havuz.style.width) || 298;
                            const havuzMerkezi = havuzLeft + havuzWidth / 2;
                            const mesafe = Math.abs(karakterMerkez - havuzMerkezi);

                            // Artık doğru, dinamik olarak hesaplanmış değerleri kullanıyor
                            const basariMesafeSiniri = AYARLAR.puanlama.basariMesafeSiniri * ortalamaOran;
                            const puanlamaKatsayisi = AYARLAR.puanlama.puanlamaKatsayisi * ortalamaOran;

                            if (mesafe < basariMesafeSiniri) {
                                basariliAtlayis = true;
                                // YENİ: Dinamik puanlama - target boyutuna göre otomatik ayarlanıyor

                                    zorlukBilgisi = ` 🎯 Küçük hedef!`;

                                sendChatMessageToKick(skorMesaji);

                                PairaWALInstance.append({ type: "SCORE", user: kullaniciAdi, score: puan });
                                PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: kullaniciAdi, amount: puan, reason: "jump" });

                            } else {
                                console.log(`💥 HAVUZ KAÇIRILDI! ${kullaniciAdi} - Mesafe: ${mesafe.toFixed(1)}`);
                            }
                        } else {
                            console.log('💥 HAVUZ KAÇIRILDI! (Havuz gizliydi)');
                        }
                        const beklemeSuresi = basariliAtlayis ? 3000 : 100;
                        setTimeout(() => {

                            karakterPozisyonlari.delete(jumpId);
                            setTimeout(() => {
                                if (karakter.parentNode) karakter.parentNode.removeChild(karakter);
                                if (kullaniciEtiketi.parentNode) kullaniciEtiketi.parentNode.removeChild(kullaniciEtiketi);
                            }, 300);
                        }, beklemeSuresi);
                        return;
                    }
                    requestAnimationFrame(animasyon);
                };
                requestAnimationFrame(animasyon);
