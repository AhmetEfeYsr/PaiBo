            function hizSinirla(vx, vy, maksimumYatayHiz, maksimumDikeyHiz) {
                if (Math.abs(vx) > maksimumYatayHiz) { vx = vx > 0 ? maksimumYatayHiz : -maksimumYatayHiz; }
                if (Math.abs(vy) > maksimumDikeyHiz) { vy = vy > 0 ? maksimumDikeyHiz : -maksimumDikeyHiz; }
                return { vx, vy };
            }

            // Basit dikdörtgen çarpışma tespiti (AABB)
            function karakterCarpismaTespiti(mevcutJumpId, x, y, karakterGenisligi, karakterYuksekligi) {
                for (const [jumpId, pozisyon] of karakterPozisyonlari) {
                    if (jumpId === mevcutJumpId) continue;
                    if (!pozisyon || !pozisyon.karakter) continue;

                    const digerX = pozisyon.x;
                    const digerY = pozisyon.y;
                    if (digerX === undefined || digerY === undefined) continue;

                    const digerGenislik = pozisyon.genislik || pozisyon.karakter.clientWidth;
                    const digerYukseklik = pozisyon.yukseklik || pozisyon.karakter.clientHeight;

                    // Basit AABB (dikdörtgen) çarpışma kontrolü
                    if (x < digerX + digerGenislik && x + karakterGenisligi > digerX &&
                        y < digerY + digerYukseklik && y + karakterYuksekligi > digerY) {

                        if (pozisyon.vx !== undefined && pozisyon.vy !== undefined) {
                            return { carpisma: true, digerKullanici: jumpId, digerPozisyon: pozisyon };
                        }
                    }
                }
                return { carpisma: false };
            }

            let messageQueue = [];
            let isSendingMessage = false;
            let throttleDelay = 300;

            async function sendChatMessageToKick(mesaj) {
                if (!mesaj) return;
                
                if (messageQueue.length >= 10) {
                    console.warn("⚠️ Mesaj kuyruğu dolu (max 10), yeni mesaj atıldı:", mesaj);
                    return;
                }
                
                messageQueue.push(mesaj);
                processMessageQueue();
            }

            async function processMessageQueue() {
                if (isSendingMessage || messageQueue.length === 0) return;
                isSendingMessage = true;

                const mesaj = messageQueue.shift();
                
                if (messageQueue.length >= 5) {
                    throttleDelay = 1000;
                } else if (messageQueue.length >= 2) {
                    throttleDelay = 500;
                } else {
                    throttleDelay = 300;
                }

                try {
                    await executeSendChatMessage(mesaj);
                } catch (e) {
                    console.error("Failed to send message:", e);
                }

                setTimeout(() => {
                    isSendingMessage = false;
                    processMessageQueue();
                }, throttleDelay);
            }

            async function fetchAccessToken(forceRefresh = false) {
                if (!broadcasterSecret || !broadcasterUserId || !paramUserId) {
                    console.warn('⚠️ Token Broker yapılandırması eksik (secret, broadcaster_user_id veya id).');
                    return null;
                }

                try {
                    const timestamp = Math.floor(Date.now() / 1000).toString();
                    // İmza = HMAC-SHA256(secret, "userId:timestamp:broadcaster_user_id:force_refresh")
                    const payload = `${paramUserId}:${timestamp}:${broadcasterUserId}:${forceRefresh ? 'true' : 'false'}`;
                    const encoder = new TextEncoder();
                    const keyData = encoder.encode(broadcasterSecret);
                    const msgData = encoder.encode(payload);

                    const cryptoKey = await crypto.subtle.importKey(
                        'raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
                    );
                    const signatureBuffer = await crypto.subtle.sign('HMAC', cryptoKey, msgData);
                    const signature = Array.from(new Uint8Array(signatureBuffer))
                        .map(b => b.toString(16).padStart(2, '0')).join('');

                    const response = await fetch(SERVERLESS_CHAT_API, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Signature': signature,
                            'X-Timestamp': timestamp,
                            'X-User-Id': paramUserId
                        },
                        body: JSON.stringify({
                            broadcaster_user_id: broadcasterUserId,
                            force_refresh: forceRefresh
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.access_token) {
                            currentAccessToken = data.access_token;
                            console.log('✅ Yeni access_token başarıyla alındı.');
                            return currentAccessToken;
                        }
                    }
                    console.error('❌ Token dağıtıcıdan token alınamadı. HTTP', response.status);
                    return null;
                } catch (error) {
                    console.error('❌ Token alınırken hata oluştu:', error);
                    return null;
                }
            }

            async function executeSendChatMessage(mesaj, isRetry = false) {
                if (!broadcasterSecret || !broadcasterUserId || !paramUserId) {
                    console.warn('⚠️ Chat API yapılandırması eksik (secret, broadcaster_user_id veya id). Mesaj gönderilemedi:', mesaj);
                    return;
                }

                if (!currentAccessToken) {
                    const token = await fetchAccessToken(false);
                    if (!token) {
                        console.error('⚠️ Token alınamadığı için mesaj gönderilemiyor:', mesaj);
                        return;
                    }
                }

                try {
                    const chatPayload = {
                        broadcaster_user_id: parseInt(broadcasterUserId),
                        content: mesaj.substring(0, 500),
                        type: "bot"
                    };

                    const response = await fetch('https://api.kick.com/public/v1/chat', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${currentAccessToken}`,
                            'Content-Type': 'application/json',
                            'Accept': '*/*'
                        },
                        body: JSON.stringify(chatPayload)
                    });

                    if (response.ok) {
                        console.log(`📤 Mesaj doğrudan Kick API üzerinden gönderildi: ${mesaj}`);
                    } else if (response.status === 401 && !isRetry) {
                        console.warn('⚠️ Token geçersiz/süresi dolmuş (401). Yenilenip tekrar deneniyor...');
                        const token = await fetchAccessToken(true);
                        if (token) {
                            await executeSendChatMessage(mesaj, true);
                        } else {
                            console.error('❌ Token yenilenemedi, mesaj gönderilemedi.');
                        }
                    } else {
                        const errText = await response.text();
                        console.error(`❌ Kick Chat API Hatası (HTTP ${response.status}):`, errText);
                    }
                } catch (error) {
                    console.error('❌ Chat mesajı doğrudan gönderilirken ağ hatası:', error);
                }
            }

            function siraIslet() {
                if (atlamaSirasi.length === 0) {
                    console.log("✅ Toplu atlama sırası tamamlandı.");
                    return;
                }
                const atlayacakKisi = atlamaSirasi.shift();
                console.log(`▶️ Sıradan işletiliyor: ${atlayacakKisi.username} (Kalan: ${atlamaSirasi.length})`);
                atlaAnimasyonunuBaslat(atlayacakKisi.username, atlayacakKisi.emojiId, atlayacakKisi.requestedSkin);
                setTimeout(siraIslet, AYARLAR.topluAtlamaGecikmesi);
            }

            // updateOAuthStatus: Durum göstergesi kaldırıldı, çağrılar no-op.
            function updateOAuthStatus() {}

            // Python proxy kaldırıldı. Mesaj gönderimi artık doğrudan AWS API üzerinden yapılıyor.
            // connectToProxyServer fonksiyonu artık gerekli değil.

            let watchdogTimer = null;
            let reconnectDelay = 1000;
            let activeWS = null;

            function resetWatchdog(ws, chatroomId) {
                if (watchdogTimer) clearTimeout(watchdogTimer);
                watchdogTimer = setTimeout(() => {
                    console.warn("⚠️ Kick WebSocket inaktivite zaman aşımı (45s). Yeniden bağlanılıyor...");
                    ws.close();
                }, 45000);
            }

            function connectToKickChat(chatroomId) {
                if (activeWS) {
                    try {
                        activeWS.onopen = null;
                        activeWS.onmessage = null;
                        activeWS.onclose = null;
                        activeWS.onerror = null;
                        activeWS.close();
                    } catch (e) {
                        console.error("Error closing existing WS:", e);
                    }
                }

                console.log(`Kick sohbet sunucusuna bağlanılıyor: ${AYARLAR.kickWebSocketUrl}`);
                let ws;
                try {
                    ws = new WebSocket(AYARLAR.kickWebSocketUrl);
                    activeWS = ws;
                } catch (e) {
                    console.error("Failed to construct WebSocket:", e);
                    setTimeout(() => connectToKickChat(chatroomId), reconnectDelay);
                    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
                    return;
                }

                ws.onopen = () => {
                    console.log("Kick sohbet sunucusuna başarıyla bağlanıldı!");
                    const subscribeMessage = { event: "pusher:subscribe", data: { channel: `chatrooms.${chatroomId}.v2`, auth: "" } };
                    ws.send(JSON.stringify(subscribeMessage));
                    console.log(`'${chatroomId}' ID'li odaya abonelik isteği gönderildi.`);
                    reconnectDelay = 1000;
                    resetWatchdog(ws, chatroomId);
                };

                ws.onmessage = (event) => {
                    resetWatchdog(ws, chatroomId);
                    try {
                        const eventData = JSON.parse(event.data);

                        if (eventData.event === 'pusher:ping') {
                            ws.send(JSON.stringify({ event: 'pusher:pong' }));
                            return;
                        }

                        if (eventData.event === 'App\\Events\\ChatMessageEvent') {
                            const chatMessage = JSON.parse(eventData.data);

                            const username = chatMessage.sender?.username || 'Bilinmeyen';
                            const normalizedUsername = username.toLowerCase();
                            const content = (chatMessage.content || '').trim();
                            const cleanContent = content.toLowerCase();

                            // --- MODERATÖRLERİN OTOMATİK YETKİ ALMASI ---
                            const sender = chatMessage.sender || {};
                            const senderIdentity = sender.identity || {};
                            const senderBadges = senderIdentity.badges || [];

                            const isModerator = (
                                sender.is_moderator === true ||
                                sender.is_broadcaster === true ||
                                sender.is_owner === true ||
                                sender.is_staff === true ||
                                senderBadges.some(badge => {
                                    const t = (badge.type || '').toLowerCase();
                                    return t === 'moderator' || t === 'broadcaster' || t === 'owner' || t === 'staff' || t === 'mod';
                                })
                            );

                            if (isModerator && !AYARLAR.yetkiliListesi.includes(normalizedUsername)) {
                                AYARLAR.yetkiliListesi.push(normalizedUsername);
                                console.log(`🛡️ MOD OTOMATİK YETKİ: ${username} moderatör olarak algılandı ve yetkili listesine eklendi!`);
                            }

                            const isYetkili = AYARLAR.yetkiliListesi.includes(normalizedUsername);

                            // --- KRİZ MODU (UNDER ATTACK) KORUMASI ---
                            if (underAttackMode && !isYetkili) {
                                if (isAllCaps(content)) {
                                    sendChatMessageToKick(`/timeout ${username} 300`);
                                    sendChatMessageToKick(`🛡️ @${username}, kriz modunda büyük harf kullandığın için 5 dakika susturuldun.`);
                                    return;
                                }
                                const isGameCmd = cleanContent.startsWith('!atla') || 
                                                  cleanContent.startsWith('!profil') || 
                                                  cleanContent.startsWith('!puan') || 
                                                  cleanContent.startsWith('!market') || 
                                                  cleanContent.startsWith('!kuşan') || 
                                                  cleanContent.startsWith('!equip') || 
                                                  cleanContent.startsWith('!envanter') || 
                                                  cleanContent.startsWith('!hediye') || 
                                                  cleanContent.startsWith('!evlen') || 
                                                  cleanContent.startsWith('!nişan') || 
                                                  cleanContent.startsWith('!bosan') || 
                                                  cleanContent.startsWith('!sev') || 
                                                  cleanContent.startsWith('!öp') || 
                                                  cleanContent.startsWith('!döv') || 
                                                  cleanContent.startsWith('!dayak');
                                if (isGameCmd) {
                                    console.log(`🚫 Under Attack: ${username}'in '${cleanContent}' komutu engellendi.`);
                                    return;
                                }
                            }

                            // --- GAME ACTIVE CHECKS ---
                            if (wordGameActive && !cleanContent.startsWith('!')) {
                                const word = cleanContent.trim();
                                if (/^[a-zA-ZğüşıöçĞÜŞİÖÇ]+$/.test(word) && word.length >= 3) {
                                    if (word.includes(wordGamePattern.toLowerCase())) {
                                        if (!usedWords.has(word)) {
                                            const isValid = (turkishWordsSet.size === 0) || turkishWordsSet.has(word);
                                            if (isValid) {
                                                usedWords.add(word);
                                                const timerEl = document.getElementById('widget-timer');
                                                const remTime = timerEl ? (parseInt(timerEl.textContent) || 10) : 10;
                                                wordGameWinners.push({ user: username, word: word, score: remTime });
                                                updateWidgetFooter(`Son: ${word} (@${username})`);
                                                console.log(`✅ Kelime: ${word} from ${username} (+${remTime} pts)`);
                                            }
                                        }
                                    }
                                }
                            }

                            if (triviaActive && !cleanContent.startsWith('!')) {
                                const ans = cleanContent.trim();
                                if (ans === triviaAnswer) {
                                    if (!triviaWinners.includes(username)) {
                                        triviaWinners.push(username);
                                        updateWidgetFooter(`${triviaWinners.length} kişi doğru bildi!`);
                                        console.log(`🎯 Trivia doğru: ${username}`);
                                    }
                                }
                            }

                            // --- MODERATOR COMMANDS ---
                            if (isYetkili) {
                                if (cleanContent === '!underattack') {
                                    const nextState = !underAttackMode;
                                    PairaWALInstance.append({ type: "UNDER_ATTACK", active: nextState });
                                    sendChatMessageToKick(`⚠️ KRİZ MODU (Under Attack) ${nextState ? 'AKTİF EDİLDİ! Oyun komutları devredışı, spam engelleme devrede.' : 'KAPATILDI! Normale dönüldü.'}`);
                                    return;
                                }

                                if (cleanContent === '!trivia') {
                                    startTriviaGame();
                                    return;
                                }

                                if (cleanContent === '!kelimeoyunu') {
                                    startWordGame();
                                    return;
                                }

                                if (cleanContent === '!topluatla') {
                                    topluAtlamaAktif = true;
                                    atlamaSirasi = [];
                                    console.warn("🟢 TOPLU ATLAMA MODU AÇIK! '!atla' komutları sıraya alınıyor.");
                                    sendChatMessageToKick(`🟢 TOPLU ATLAMA başladı! Herkes '!atla' yazsın! Mod ${username} komutu verdiğinde hep birlikte atlayacaksınız! 🎉`);
                                    return;
                                }

                                if (cleanContent === '!atlat') {
                                    if (atlamaSirasi.length === 0) {
                                        console.warn("🟡 '!atlat' komutu alındı ama sıra boş.");
                                        sendChatMessageToKick(`⚠️ Sırada kimse yok! Önce '!topluatla' ile modu açın, herkes '!atla' yazsın.`);
                                        topluAtlamaAktif = false;
                                        return;
                                    }
                                    const kisiSayisi = atlamaSirasi.length;
                                    topluAtlamaAktif = false;
                                    console.warn(`🔴 TOPLU ATLAMA MODU KAPALI. ${kisiSayisi} kişilik sıra işletiliyor...`);
                                    sendChatMessageToKick(`🚀 TOPLU ATLAMA! ${kisiSayisi} kişi aynı anda atlıyor! 💥`);
                                    siraIslet();
                                    return;
                                }

                                if (cleanContent === '!topluiptal') {
                                    if (topluAtlamaAktif) {
                                        const iptalEdilen = atlamaSirasi.length;
                                        topluAtlamaAktif = false;
                                        atlamaSirasi = [];
                                        console.warn(`❌ Toplu atlama iptal edildi. ${iptalEdilen} kişi sıradan çıkarıldı.`);
                                        sendChatMessageToKick(`❌ Toplu atlama iptal edildi! (${iptalEdilen} kişi sıradaydı)`);
                                    } else {
                                        sendChatMessageToKick(`⚠️ Zaten aktif bir toplu atlama yok.`);
                                    }
                                    return;
                                }

                                if (cleanContent.startsWith('!ban ')) {
                                    const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                    const targetMention = cmdParts[1] || '';
                                    const targetName = targetMention.replace('@', '').trim();
                                    if (targetName) {
                                        sendChatMessageToKick(`/ban ${targetName}`);
                                        sendChatMessageToKick(`🛡️ @${targetName} kanaldan banlandı!`);
                                    }
                                    return;
                                }
                            }

                            // --- USER COMMANDS WITH COOLDOWN ---
                            if (cleanContent === '!eniyi') {
                                if (!checkCommandCooldown(username, "!eniyi")) return;
                                const sortedScores = Array.from(enIyiSkorlarMap.entries())
                                    .sort((a, b) => b[1] - a[1])
                                    .slice(0, 5);

                                let chatMesaji = "🏆 En İyi 5 Skor: ";
                                if (sortedScores.length === 0) {
                                    chatMesaji = "Henüz başarılı bir atlayış olmadı.";
                                } else {
                                    const messages = sortedScores.map((entry, index) => {
                                        return `${index + 1}. ${entry[0]} (${entry[1].toFixed(0)} Puan)`;
                                    });
                                    chatMesaji += messages.join(' | ');
                                }
                                sendChatMessageToKick(chatMesaji);
                                return;
                            }

                            if (cleanContent === '!son') {
                                if (!checkCommandCooldown(username, "!son")) return;
                                let chatMesaji = "⏱️ Son Başarılı Atlayışlar: ";
                                if (sonSkorlar.length === 0) {
                                    chatMesaji = "Henüz başarılı bir atlayış olmadı.";
                                } else {
                                    const messages = sonSkorlar.map((entry) => {
                                        return `${entry.username} (${entry.score.toFixed(0)} Puan)`;
                                    });
                                    chatMesaji += messages.join(' | ');
                                }
                                sendChatMessageToKick(chatMesaji);
                                return;
                            }

                            if (cleanContent === '!sira') {
                                if (!checkCommandCooldown(username, "!sira")) return;
                                if (topluAtlamaAktif) {
                                    const siraListesi = atlamaSirasi.map(k => k.username).join(', ');
                                    sendChatMessageToKick(`📋 Sırada ${atlamaSirasi.length} kişi var: ${siraListesi || 'Henüz kimse yok'}`);
                                } else {
                                    sendChatMessageToKick(`⚠️ Toplu atlama modu şu an aktif değil.`);
                                }
                                return;
                            }
                            
                            if (cleanContent === '!katıl') {
                                PairaWALInstance.append({ type: "RAFFLE_JOIN", user: username });
                                console.log(`🎟️ ${username} çekilişe katıldı.`);
                                return;
                            }

                            // --- RPG COMMANDS ---
                            if (cleanContent === '!profil' || cleanContent === '!puan') {
                                if (!checkCommandCooldown(username, "!profil")) return;
                                const profile = getOrCreateProfile(username);
                                const partner = getMarriedPartner(username) || getEngagedPartner(username);
                                const partnerText = partner ? ` | 💍 Eş/Nişanlı: @${partner}` : '';
                                const invText = profile.envanter.length > 0 ? profile.envanter.join(', ') : 'Boş';
                                sendChatMessageToKick(`👤 @${username} | Seviye: ${profile.seviye} | Puan: ${profile.puan} | Sağlık: %${profile.health}${partnerText} | Envanter: [${invText}]`);
                                return;
                            }

                            if (cleanContent === '!market' || cleanContent.startsWith('!market ')) {
                                const baseItems = {
                                    "1": { name: "Yüzük", price: 1000 },
                                    "2": { name: "Çiçek", price: 200 },
                                    "3": { name: "Madalya", price: 500 },
                                    "4": { name: "Kalp", price: 300 },
                                    "5": { name: "Yıldız", price: 400 },
                                    "6": { name: "Gül", price: 150 },
                                    "7": { name: "Çikolata", price: 100 },
                                    "8": { name: "Mektup", price: 50 },
                                    "9": { name: "Aşk Okları", price: 250 }
                                };
                                
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                if (cmdParts.length === 1) {
                                    if (!checkCommandCooldown(username, "!market")) return;
                                    const baseCatalog = Object.entries(baseItems).map(([id, item]) => `${id}. ${item.name} (${item.price} Puan)`).join(' | ');
                                    
                                    // Compile approved skins from global developer catalog
                                    const devCatalogList = [];
                                    for (const item of globalMarketItems.values()) {
                                        if (item.status === 'approved' && item.type === 'skin' && !disabledMarketItems.has(String(item.id))) {
                                            devCatalogList.push(`${item.id}. ${item.name} (${item.price} Puan)`);
                                        }
                                    }
                                    const devCatalog = devCatalogList.join(' | ');
                                    
                                    sendChatMessageToKick(`🛒 Market: ${baseCatalog}${devCatalog ? ' | ' + devCatalog : ''} (Satın almak için: !market [id])`);
                                    return;
                                }
                                
                                const itemParam = content.substring(content.toLowerCase().indexOf('!market') + 7).trim();
                                const lowerParam = itemParam.toLowerCase();
                                
                                // 1. Check in base items
                                let itemSelected = baseItems[itemParam] || Object.values(baseItems).find(i => i.name.toLowerCase() === lowerParam);
                                
                                // 2. Check in global items
                                if (!itemSelected) {
                                    const devItem = globalMarketItems.get(itemParam) || Array.from(globalMarketItems.values()).find(i => i.name.toLowerCase() === lowerParam);
                                    if (devItem) {
                                        if (devItem.status !== 'approved') {
                                            sendChatMessageToKick(`⚠️ @${username}, bu ürün henüz yönetici tarafından onaylanmamış!`);
                                            return;
                                        }
                                        if (disabledMarketItems.has(String(devItem.id))) {
                                            sendChatMessageToKick(`⚠️ @${username}, '${devItem.name}' görünümü yayıncı tarafından bu kanalda devre dışı bırakılmıştır!`);
                                            return;
                                        }
                                        if (devItem.type !== 'skin') {
                                            sendChatMessageToKick(`⚠️ @${username}, '${devItem.name}' bir ekran widget'ıdır. Yayıncılar bunu doğrudan web panelinden kurabilir, chat'ten satın alınamaz.`);
                                            return;
                                        }
                                        itemSelected = { name: devItem.name, price: devItem.price };
                                    }
                                }
                                
                                if (!itemSelected) {
                                    sendChatMessageToKick(`⚠️ @${username}, geçersiz ürün ID veya adı!`);
                                    return;
                                }
                                
                                const profile = getOrCreateProfile(username);
                                if (profile.puan < itemSelected.price) {
                                    sendChatMessageToKick(`⚠️ @${username}, yeterli puanın yok! Gerekli: ${itemSelected.price} | Mevcut: ${profile.puan}`);
                                    return;
                                }
                                
                                PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: username, amount: -itemSelected.price, reason: "market_buy" });
                                PairaWALInstance.append({ type: "RPG_INVENTORY", user: username, item: itemSelected.name, action: "ADD" });
                                sendChatMessageToKick(`🛒 @${username}, '${itemSelected.name}' satın aldı! Yeni bakiye: ${profile.puan - itemSelected.price} puan.`);
                                return;
                            }

                            if (cleanContent.startsWith('!kuşan ') || cleanContent.startsWith('!equip ')) {
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                if (cmdParts.length < 2) {
                                    sendChatMessageToKick(`⚠️ Kullanım: !kuşan [görünüm_adı] (Örn: !kuşan peluş)`);
                                    return;
                                }
                                const commandWord = cleanContent.startsWith('!kuşan ') ? '!kuşan' : '!equip';
                                const requestedSkin = content.substring(content.toLowerCase().indexOf(commandWord) + commandWord.length).trim().toLowerCase();
                                const profile = getOrCreateProfile(username);
                                const ownedItems = (profile.envanter || []).map(i => i.toLowerCase().trim());
                                
                                const matchedItem = (profile.envanter || []).find(i => {
                                    const raw = i.toLowerCase().trim();
                                    if (raw === requestedSkin) return true;
                                    if (requestedSkin === 'pelus' && raw === 'peluş') return true;
                                    if (requestedSkin === 'nilufer' && raw === 'nilüfer') return true;
                                    if (requestedSkin === 'raki' && raw === 'rakı') return true;
                                    if (requestedSkin === 'cay' && raw === 'çay') return true;
                                    return false;
                                });
                                
                                if (!matchedItem) {
                                    sendChatMessageToKick(`⚠️ @${username}, envanterinde '${requestedSkin}' adlı bir görünüm bulunamadı!`);
                                    return;
                                }
                                
                                PairaWALInstance.append({
                                    type: "EQUIP_SKIN",
                                    user: username,
                                    skinName: matchedItem
                                });
                                sendChatMessageToKick(`🎭 @${username}, yeni görünümünü başarıyla kuşandı: ${matchedItem} 🎉`);
                                return;
                            }

                            if (cleanContent === '!envanter' || cleanContent.startsWith('!envanter ')) {
                                const profile = getOrCreateProfile(username);
                                const ownedItems = profile.envanter || [];
                                
                                if (ownedItems.length === 0) {
                                    sendChatMessageToKick(`🎒 @${username} envanteri boş.`);
                                    return;
                                }
                                
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                let page = 1;
                                if (cmdParts.length > 1) {
                                    const parsedPage = parseInt(cmdParts[1]);
                                    if (!isNaN(parsedPage) && parsedPage > 0) {
                                        page = parsedPage;
                                    }
                                }
                                
                                const itemsPerPage = 10;
                                const totalPages = Math.ceil(ownedItems.length / itemsPerPage);
                                
                                if (page > totalPages) {
                                    sendChatMessageToKick(`⚠️ @${username}, geçersiz sayfa! Toplam sayfa: ${totalPages}`);
                                    return;
                                }
                                
                                const startIndex = (page - 1) * itemsPerPage;
                                const endIndex = Math.min(startIndex + itemsPerPage, ownedItems.length);
                                const pageItems = ownedItems.slice(startIndex, endIndex);
                                
                                const listText = pageItems.map((item, idx) => `${startIndex + idx + 1}. ${item}`).join(', ');
                                sendChatMessageToKick(`🎒 @${username} Envanteri (Sayfa ${page}/${totalPages}): ${listText}`);
                                return;
                            }

                            if (cleanContent.startsWith('!hediye ')) {
                                if (!checkCommandCooldown(username, "!hediye")) return;
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                if (cmdParts.length < 3) {
                                    sendChatMessageToKick(`⚠️ Kullanım: !hediye [eşya_adı] @kullanıcı`);
                                    return;
                                }
                                const targetMention = cmdParts[cmdParts.length - 1].trim();
                                const targetName = targetMention.replace('@', '').trim();
                                const commandWord = "!hediye";
                                const contentLower = content.toLowerCase();
                                const cmdIdx = contentLower.indexOf(commandWord);
                                const remainingText = content.substring(cmdIdx + commandWord.length).trim();
                                const lastWordIdx = remainingText.lastIndexOf(targetMention);
                                const itemName = remainingText.substring(0, lastWordIdx).trim();
                                
                                const profile = getOrCreateProfile(username);
                                const itemIdx = profile.envanter.findIndex(i => i.toLowerCase() === itemName.toLowerCase());
                                if (itemIdx === -1) {
                                    sendChatMessageToKick(`⚠️ @${username}, envanterinde '${itemName}' bulunamadı.`);
                                    return;
                                }
                                const actualItemName = profile.envanter[itemIdx];
                                
                                PairaWALInstance.append({ type: "RPG_INVENTORY", user: username, item: actualItemName, action: "REMOVE" });
                                PairaWALInstance.append({ type: "RPG_INVENTORY", user: targetName, item: actualItemName, action: "ADD" });
                                
                                let affinityGained = 0;
                                const itemLower = actualItemName.toLowerCase();
                                if (itemLower === "çiçek" || itemLower === "cicek") affinityGained = 10;
                                else if (itemLower === "yüzük" || itemLower === "yuzuk") affinityGained = 50;
                                else if (itemLower === "kalp") affinityGained = 15;
                                else if (itemLower === "gül" || itemLower === "gul") affinityGained = 12;
                                else if (itemLower === "çikolata" || itemLower === "cikolata") affinityGained = 8;
                                else if (itemLower === "mektup") affinityGained = 5;
                                else if (itemLower === "aşk okları" || itemLower === "ask oklari") affinityGained = 20;

                                if (affinityGained > 0) {
                                    PairaWALInstance.append({ type: "RPG_SOCIAL", user1: username, user2: targetName, affinity: affinityGained, hostility: 0 });
                                    sendChatMessageToKick(`🎁 @${username}, @${targetName} kullanıcısına '${actualItemName}' hediye etti ve aralarındaki sevgi bağı güçlendi! (+${affinityGained} Sevgi Puanı) ❤️`);
                                } else {
                                    sendChatMessageToKick(`🎁 @${username}, @${targetName} kullanıcısına '${actualItemName}' hediye etti!`);
                                }
                                return;
                            }

                            if (cleanContent.startsWith('!evlen ')) {
                                if (!checkCommandCooldown(username, "!evlen")) return;
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                const targetMention = cmdParts[1] || '';
                                const targetName = targetMention.replace('@', '').trim();
                                if (!targetName || targetName.toLowerCase() === normalizedUsername) {
                                    sendChatMessageToKick(`⚠️ Geçersiz eş seçimi.`);
                                    return;
                                }
                                
                                const marriedPartner1 = getMarriedPartner(username);
                                if (marriedPartner1) {
                                    sendChatMessageToKick(`⚠️ Başarısız! @${username} zaten @${marriedPartner1} ile evli! Önce !bosan komutunu kullanmalısın.`);
                                    return;
                                }
                                const marriedPartner2 = getMarriedPartner(targetName);
                                if (marriedPartner2) {
                                    sendChatMessageToKick(`⚠️ Başarısız! @${targetName} zaten @${marriedPartner2} ile evli! Önce !bosan komutunu kullanmalısın.`);
                                    return;
                                }
                                
                                pendingMarriageProposals.set(targetName.toLowerCase(), {
                                    sender: username,
                                    ts: Date.now()
                                });
                                sendChatMessageToKick(`❤️ @${username}, @${targetName} kullanıcısına evlilik teklif etti! Kabul etmek için 60 saniye içinde '!evet' yazın.`);
                                return;
                            }

                            if (cleanContent.startsWith('!nişan ')) {
                                if (!checkCommandCooldown(username, "!nisan")) return;
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                const targetMention = cmdParts[1] || '';
                                const targetName = targetMention.replace('@', '').trim();
                                if (!targetName || targetName.toLowerCase() === normalizedUsername) {
                                    sendChatMessageToKick(`⚠️ Geçersiz seçim.`);
                                    return;
                                }
                                
                                const marriedPartner1 = getMarriedPartner(username);
                                const engagedPartner1 = getEngagedPartner(username);
                                if (marriedPartner1 || engagedPartner1) {
                                    sendChatMessageToKick(`⚠️ Başarısız! @${username} zaten @${marriedPartner1 || engagedPartner1} ile evli veya nişanlı! Önce !bosan komutunu kullanmalısın.`);
                                    return;
                                }
                                
                                const marriedPartner2 = getMarriedPartner(targetName);
                                const engagedPartner2 = getEngagedPartner(targetName);
                                if (marriedPartner2 || engagedPartner2) {
                                    sendChatMessageToKick(`⚠️ Başarısız! @${targetName} zaten @${marriedPartner2 || engagedPartner2} ile evli veya nişanlı! Önce !bosan komutunu kullanmalısın.`);
                                    return;
                                }
                                
                                pendingEngagementProposals.set(targetName.toLowerCase(), {
                                    sender: username,
                                    ts: Date.now()
                                });
                                sendChatMessageToKick(`💍 @${username}, @${targetName} kullanıcısına nişan teklif etti! Kabul etmek için 60 saniye içinde '!evet' yazın.`);
                                return;

            function playLegendarySound() {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    for (let i = 0; i < 8; i++) {
                        const time = audioCtx.currentTime + i * 0.1;
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(440 * Math.pow(1.5, i), time);
                        gain.gain.setValueAtTime(0.15, time);
                        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
                        osc.start(time);
                        osc.stop(time + 0.3);
                    }
                    const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
                    const output = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < noiseBuffer.length; i++) {
                        output[i] = Math.random() * 2 - 1;
                    }
                    const whiteNoise = audioCtx.createBufferSource();
                    whiteNoise.buffer = noiseBuffer;
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 800;
                    const noiseGain = audioCtx.createGain();
                    noiseGain.gain.setValueAtTime(0.2, audioCtx.currentTime + 0.1);
                    noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                    whiteNoise.connect(filter);
                    filter.connect(noiseGain);
                    noiseGain.connect(audioCtx.destination);
                    whiteNoise.start(audioCtx.currentTime + 0.1);
                    whiteNoise.stop(audioCtx.currentTime + 0.5);
                } catch (e) {
                    console.warn("Failed to play synth sound:", e);
                }
            }

            function spawnButterfly() {
                if (isButterflyActive) return;
                if (!activePlugins.has("butterfly")) return;
                
                const rarities = [
                    { type: 'yesil', name: 'Yeşil', chance: 40, points: 50 },
                    { type: 'gumus', name: 'Gümüş', chance: 25, points: 80 },
                    { type: 'mavi', name: 'Mavi', chance: 18, points: 150 },
                    { type: 'mor', name: 'Mor', chance: 10, points: 400 },
                    { type: 'kirmizi', name: 'Kırmızı', chance: 5, points: 800 },
                    { type: 'altin', name: 'Altın', chance: 2, points: 1200 }
                ];
                
                const roll = Math.random() * 100;
                let chosen = rarities[0];
                let accum = 0;
                for (const r of rarities) {
                    accum += r.chance;
                    if (roll <= accum) {
                        chosen = r;
                        break;
                    }
                }
                
                isButterflyActive = true;
                
                const container = document.createElement('div');
                container.className = 'butterfly-container';
                container.id = 'butterfly-active';
                
                const butterfly = document.createElement('div');
                butterfly.className = `butterfly butterfly-${chosen.type}`;
                
                const wingLeft = document.createElement('div');
                wingLeft.className = 'wing wing-left';
                
                const wingRight = document.createElement('div');
                wingRight.className = 'wing wing-right';
                
                const body = document.createElement('div');
                body.className = 'body';
                
                butterfly.appendChild(wingLeft);
                butterfly.appendChild(wingRight);
                butterfly.appendChild(body);
                container.appendChild(butterfly);
                document.body.appendChild(container);
                
                let currentX = Math.random() * (window.innerWidth - 120) + 60;
                let currentY = Math.random() * (window.innerHeight - 120) + 60;
                container.style.left = `${currentX}px`;
                container.style.top = `${currentY}px`;
                
                let targetX = Math.random() * (window.innerWidth - 120) + 60;
                let targetY = Math.random() * (window.innerHeight - 120) + 60;
                
                activeButterfly = {
                    rarity: chosen.type,
                    name: chosen.name,
                    points: chosen.points,
                    element: container,
                    timeout: null
                };
                
                let angle = 0;
                const flyInterval = setInterval(() => {
                    if (!isButterflyActive || !activeButterfly) {
                        clearInterval(flyInterval);
                        return;
                    }
                    const dx = targetX - currentX;
                    const dy = targetY - currentY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 20) {
                        targetX = Math.random() * (window.innerWidth - 120) + 60;
                        targetY = Math.random() * (window.innerHeight - 120) + 60;
                    } else {
                        let speed = 2.5;
                        if (chosen.type === 'gumus') speed = 3.0;
                        if (chosen.type === 'mavi') speed = 3.5;
                        if (chosen.type === 'mor') speed = 4.5;
                        if (chosen.type === 'kirmizi') speed = 5.2;
                        if (chosen.type === 'altin') speed = 6.0;
                        
                        let wave = 0;
                        if (chosen.type === 'yesil' || chosen.type === 'gumus') {
                            angle += 0.05;
                            wave = Math.sin(angle) * 1.5;
                        }
                        
                        currentX += (dx / dist) * speed;
                        currentY += (dy / dist) * speed + wave;
                        
                        container.style.left = `${currentX}px`;
                        container.style.top = `${currentY}px`;
                        
                        const angleRad = Math.atan2(dy, dx);
                        const angleDeg = (angleRad * 180) / Math.PI + 90;
                        butterfly.style.transform = `rotate(${angleDeg}deg)`;
                    }
                    
                    if (chosen.type === 'mor' && Math.random() < 0.3) {
                        createSparkle(currentX + 30, currentY + 30, 'rgba(178, 102, 255, 0.8)');
                    }
                    if (chosen.type === 'kirmizi' && Math.random() < 0.3) {
                        createSparkle(currentX + 30, currentY + 30, 'rgba(255, 42, 42, 0.8)');
                    }
                    if (chosen.type === 'altin' && Math.random() < 0.4) {
                        createSparkle(currentX + 30, currentY + 30, 'rgba(241, 196, 15, 0.9)');
                    }
                }, 30);
                
                if (chosen.type === 'altin') {
                    playLegendarySound();
                    triggerFireworks(currentX + 30, currentY + 30);
                }
                
                sendChatMessageToKick(`🦋 EKRANDA BİR KELEBEK BELİRDİ! ${chosen.name} Kelebek (${chosen.points} Puan değerinde)! Yakalamak için hemen !yakala yazın!`);
                
                activeButterfly.timeout = setTimeout(() => {
                    if (isButterflyActive && activeButterfly) {
                        container.style.transition = 'all 1.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
                        container.style.left = `${window.innerWidth + 200}px`;
                        container.style.top = `-200px`;
                        
                        setTimeout(() => {

                        }, 1500);
                        
                        sendChatMessageToKick(`💨 Kelebek uçup gitti! Kimse onu yakalayamadı.`);
                        isButterflyActive = false;
                        activeButterfly = null;
                    }
                }, 30000);
            }

                const userScores = new Map();
                for (const win of wordGameWinners) {
                    const lowerUser = win.user.toLowerCase();
                    const existing = userScores.get(lowerUser) || { originalName: win.user, score: 0 };
                    existing.score += win.score;
                    userScores.set(lowerUser, existing);
                }
                
                const sortedWinners = Array.from(userScores.values())
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 3);
                
                const summaryList = [];
                for (const entry of sortedWinners) {
                    PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: entry.originalName, amount: entry.score, reason: "word_game" });
                    summaryList.push(`@${entry.originalName} (+${entry.score} Puan)`);
                }
                
                sendChatMessageToKick(`⏱️ Kelime oyunu bitti! En çok puan toplayanlar: ${summaryList.join(' | ')}`);
            }
