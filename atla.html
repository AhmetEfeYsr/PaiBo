<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlama Animasyonu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Bu stiller artık JS tarafından dinamik olarak ezilecek */

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Roboto', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
            image-rendering: optimizeSpeed;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        body {
            position: relative;
            min-width: 100vw;
            min-height: 100vh;
        }

        .karakter {
            width: 100px;
            aspect-ratio: 1;
            background-image: url('karakter.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            top: -150px;
            left: -150px;
            opacity: 0;
            z-index: 10;
            transition: opacity 0.3s ease;
            will-change: transform;
            transform: translateZ(0);
        }

        /* --- DEĞİŞİKLİK 1: Sabit 'aspect-ratio' kaldırıldı --- */
        /* 'height' ve 'aspect-ratio' artık JS tarafından dinamik olarak hesaplanıp ayarlanacak. */
        #havuz {
            width: 300px;
            background-image: url('havuz.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateZ(0);
            box-sizing: border-box;
            transition: opacity 0.5s ease;
            z-index: 5;
            will-change: transform, opacity;
            backface-visibility: hidden;
            image-rendering: optimizeSpeed;
            image-rendering: crisp-edges;
        }

        /* --- DEĞİŞİKLİK 1 BİTTİ --- */

        /* Glassmorphic Widget Container */
        .widget-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(18, 18, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(200, 162, 216, 0.3);
            border-radius: 16px;
            padding: 16px;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            z-index: 200;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        
        .widget-container.active {
            opacity: 1;
            transform: translateY(0);
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .widget-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #C8A2C8, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .widget-timer {
            font-size: 14px;
            font-weight: 700;
            color: #ff00ff;
            background: rgba(255, 0, 255, 0.1);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 255, 0.3);
        }

        .widget-body {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .widget-word-pattern {
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
            margin: 12px 0;
        }

        .widget-stats {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>
    <div id="havuz"></div>

    <audio id="atlama-sesi" preload="metadata" style="display: none;">
        <source id="atlama-sesi-source" src="vada.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // === AWS SERVERLESS API YAPILANDIRMASI ===
            // Artik Python proxy'ye gerek yok. Tum mesajlar dogrudan AWS uzerinden gonderilir.

            const urlParams = new URLSearchParams(window.location.search);

            // AWS Lambda API URL'leri (Sabitlendi)
            const SERVERLESS_CHANNEL_API = 'https://9zdnkqnc90.execute-api.eu-north-1.amazonaws.com/default/kick_channel';
            const SERVERLESS_CHAT_API = 'https://nbgqqa1530.execute-api.eu-north-1.amazonaws.com/default/kick_send_message';

            // Guvenlik: Bu degerler yayinciya ozeldir ve OBS URL'sine parametre olarak eklenir.
            // broadcaster_secret hicbir zaman ag uzerinden acik gonderilmez (HMAC imzalama).
            const broadcasterSecret = urlParams.get('secret') || '';
            const broadcasterUserId = urlParams.get('broadcaster_user_id') || '';

            if (!broadcasterSecret) {
                console.warn('⚠️ Yayıncı secret anahtarı (secret) URL parametresinde bulunamadı. Chat mesajları gönderilemeyecek.');
            }

            const paramUserId = urlParams.get('id');
            const paramChannelId = urlParams.get('channelid');
            const paramChannel = urlParams.get('channel'); // Serverless API'den chatroom_id bulmak için
            const paramAuth = urlParams.get('auth');
            // OAuth kullanıldığı için token parametresi artık gerekli değil

            // char, target ve sound parametrelerini al
            const paramChar = urlParams.get('char');
            const paramTarget = urlParams.get('target');
            const paramSound = urlParams.get('sound');

            // Parametre yoksa varsayılan isimleri kullan
            const charBaseName = paramChar || 'karakter';
            const targetBaseName = paramTarget || 'havuz';
            const soundBaseName = paramSound || 'vada';

            // Boyut parametreleri
            const paramPoolWidth = parseInt(urlParams.get('poolwidth')) || 300;
            const paramCharWidth = parseInt(urlParams.get('charwidth')) || 120;
            const paramEmojiCharWidth = parseInt(urlParams.get('emojicharwidth')) || 92;
            const paramGroupCharWidth = parseInt(urlParams.get('groupcharwidth')) || 90;

            const skorGosterici = document.createElement('div');
            skorGosterici.id = 'skor-gosterici';
            skorGosterici.style.position = 'fixed';
            skorGosterici.style.bottom = '10px';
            skorGosterici.style.left = '10px';
            skorGosterici.style.color = '#C8A2C8';
            skorGosterici.style.fontSize = '16px';
            skorGosterici.style.fontWeight = '500';
            skorGosterici.style.fontFamily = "'Roboto', sans-serif";
            skorGosterici.style.textShadow = '2px 2px 4px black';
            skorGosterici.style.zIndex = '100';
            skorGosterici.style.pointerEvents = 'none';
            skorGosterici.textContent = 'En Yüksek Skor: Henüz yok';
            document.body.appendChild(skorGosterici);

            // Lisans sistemi modüler ve UX dostu bir yapı için devre dışı bırakıldı.
            console.log(`✅ Hoşgeldiniz: ${paramUserId || 'Misafir'}`);

            let currentAccessToken = '';
            let dynamicAuthorizedUsers = [];
            if (paramAuth) {
                dynamicAuthorizedUsers = paramAuth.split(',')
                    .map(user => user.trim().toLowerCase())
                    .filter(user => user.length > 0);
            }
            if (paramUserId && !dynamicAuthorizedUsers.includes(paramUserId.toLowerCase())) {
                dynamicAuthorizedUsers.push(paramUserId.toLowerCase());
            }

            const havuz = document.getElementById('havuz');
            const atlamaSesi = document.getElementById('atlama-sesi');

            // Ses kaynağını URL parametresine göre ayarla
            const atlamaSesiSource = document.getElementById('atlama-sesi-source');
            atlamaSesiSource.src = `${soundBaseName}.mp3`;

            // Ses yüklenme kontrolü
            atlamaSesi.addEventListener('canplay', () => {
                console.log('✅ Ses dosyası yüklendi ve oynatılmaya hazır');
            });
            atlamaSesi.addEventListener('error', (e) => {
                console.error(`⚠️ Ses yüklenemedi: ${soundBaseName}.mp3`, e);
            });

            atlamaSesi.load(); // Sesi yeniden yükle

            // Havuzun resmini URL parametresine göre hemen ayarla
            havuz.style.backgroundImage = `url('${targetBaseName}.png')`;

            const AYARLAR = {
                kickChatroomID: paramChannelId || 0,
                // OAuth kullanıldığı için kickApiToken artık Python proxy tarafında yönetiliyor
                kickWebSocketUrl: "wss://ws-us2.pusher.com/app/32cbd69e4b950bf97679?protocol=7&client=js&version=7.6.0&flash=false",
                yetkiliListesi: dynamicAuthorizedUsers,

                sikeListesi: [],

                topluAtlamaGecikmesi: 100,
                ozelKarakterGruplari: {
                    'grup1': { resim: '1.png', kullanicilar: [] },
                    'grup2': { resim: '2.png', kullanicilar: [] },
                    'grup3': { resim: '3.png', kullanicilar: [] }
                },
                testModu: false,
                fizik: { yerCekimi: 0.05, temelHiz: 3, hizVaryasyon: 1.5, minimumAci: 15, maksimumAci: 60, minimumIvme: 0.66, maksimumIvme: 1 },
                puanlama: {
                    // YENİ: Bu değerler target boyutuna göre dinamik olarak hesaplanacak
                    basariMesafeSiniri: 150,  // Varsayılan (300 / 2)
                    puanlamaKatsayisi: 1.5   // Varsayılan (150 * 0.01)
            };

            // ==========================================
            // === PAIRABOT WAL & RPG ENGINE IMPLEMENTATION ===
            // ==========================================

            // === RPG & GAME STATE ===
            const rpgProfiles = new Map();   // key: lowercase username -> profile
            const rpgRelations = new Map();  // key: "user1<>user2" -> status ("MARRIED" | "ENGAGED")
            const rpgSocial = new Map();     // key: "user1<>user2" -> { affinity, hostility }
            let underAttackMode = false;
            
            // Proposals for marriages and engagements
            const pendingMarriageProposals = new Map();  // key: target_lower -> { sender, ts }
            const pendingEngagementProposals = new Map(); // key: target_lower -> { sender, ts }
            
            // Trivia Game State
            let triviaActive = false;
            let triviaQuestion = null;
            let triviaAnswer = "";
            let triviaWinners = [];
            let triviaTimer = null;
            
            // Word Game State
            let wordGameActive = false;
            let wordGamePattern = "";
            let wordGameWinners = [];
            let usedWords = new Set();
            let wordGameTimer = null;
            let turkishWordsSet = new Set(); // Loaded from kelimeler.json if available

            // Cooldowns
            const commandCooldowns = new Map();

            // Load kelimeler.json if it exists
            async function loadWordDatabase() {
                try {
                    const response = await fetch('kelimeler.json');
                    if (response.ok) {
                        const words = await response.json();
                        if (Array.isArray(words)) {
                            turkishWordsSet = new Set(words.map(w => w.trim().toLowerCase()));
                            console.log(`📚 Kelime veri tabanı yüklendi. Toplam ${turkishWordsSet.size} kelime.`);
                        }
                    }
                } catch (e) {
                    console.log("ℹ️ Kelime veri tabanı (kelimeler.json) bulunamadı. Kelime oyunu için temel kontrol kullanılacak.");
                }
            }
            loadWordDatabase();

            // --- WIDGET HELPER FUNCTIONS ---
            const widget = document.createElement('div');
            widget.id = 'game-widget';
            widget.className = 'widget-container';
            widget.innerHTML = `
                <div class="widget-header">
                    <span id="widget-title" class="widget-title">Oyun</span>
                    <span id="widget-timer" class="widget-timer">30s</span>
                </div>
                <div id="widget-body" class="widget-body"></div>
                <div id="widget-footer" class="widget-stats"></div>
            `;
            document.body.appendChild(widget);

            function showWidget(title, bodyHtml, timerVal, footerText = '') {
                document.getElementById('widget-title').textContent = title;
                document.getElementById('widget-timer').textContent = `${timerVal}s`;
                document.getElementById('widget-body').innerHTML = bodyHtml;
                document.getElementById('widget-footer').textContent = footerText;
                widget.classList.add('active');
            }

            function updateWidgetTimer(val) {
                const timerEl = document.getElementById('widget-timer');
                if (timerEl) timerEl.textContent = `${val}s`;
            }

            function updateWidgetFooter(text) {
                const footerEl = document.getElementById('widget-footer');
                if (footerEl) footerEl.textContent = text;
            }

            function hideWidget() {
                widget.classList.remove('active');
            }

            // --- RPG UTILS ---
            function getOrCreateProfile(username) {
                const key = username.toLowerCase();
                if (!rpgProfiles.has(key)) {
                    rpgProfiles.set(key, {
                        username: username,
                        puan: 0,
                        seviye: 1,
                        envanter: [],
                        health: 100,
                        lastJump: 0
                    });
                }
                return rpgProfiles.get(key);
            }

            function getRelationshipKey(user1, user2) {
                return [user1.toLowerCase(), user2.toLowerCase()].sort().join("<>");
            }

            function getMarriedPartner(username) {
                const keyLower = username.toLowerCase();
                for (const [key, val] of rpgRelations.entries()) {
                    if (val === "MARRIED") {
                        const parts = key.split("<>");
                        if (parts[0] === keyLower) return parts[1];
                        if (parts[1] === keyLower) return parts[0];
                    }
                }
                return null;
            }

            function getEngagedPartner(username) {
                const keyLower = username.toLowerCase();
                for (const [key, val] of rpgRelations.entries()) {
                    if (val === "ENGAGED") {
                        const parts = key.split("<>");
                        if (parts[0] === keyLower) return parts[1];
                        if (parts[1] === keyLower) return parts[0];
                    }
                }
                return null;
            }

            function isAllCaps(text) {
                const letters = text.replace(/[^a-zA-ZğüşıöçĞÜŞİÖÇ]/g, '');
                if (letters.length < 5) return false;
                return letters === letters.toUpperCase();
            }

            function checkCommandCooldown(username, command) {
                const key = `${username.toLowerCase()}:${command.toLowerCase()}`;
                const now = Date.now();
                const lastTime = commandCooldowns.get(key) || 0;
                if (now - lastTime < 5000) {
                    return false;
                }
                commandCooldowns.set(key, now);
                return true;
            }

            // --- WAL DB REPLAY HANDLER ---
            function handleIncomingWALEvent(event, isReplaying = false) {
                if (!event || !event.type) return;

                switch (event.type) {
                    case "SCORE": {
                        const { user, score } = event;
                        const currentBest = enIyiSkorlarMap.get(user) || 0;
                        if (score > currentBest) {
                            enIyiSkorlarMap.set(user, score);
                        }
                        sonSkorlar.unshift({ username: user, score: score });
                        if (sonSkorlar.length > 10) sonSkorlar.pop();
                        break;
                    }
                    case "RPG_POINT_CHANGE": {
                        const { user, amount } = event;
                        const changeAmount = Number(amount);
                        if (!isNaN(changeAmount)) {
                            const profile = getOrCreateProfile(user);
                            profile.puan = Math.max(0, profile.puan + changeAmount);
                            
                            let needed = profile.seviye * 100;
                            while (profile.puan >= needed) {
                                profile.puan -= needed;
                                profile.seviye += 1;
                                needed = profile.seviye * 100;
                                if (!isReplaying) {
                                    sendChatMessageToKick(`🎉 @${user} seviye atladı! Yeni Seviye: ${profile.seviye}!`);
                                }
                            }
                        }
                        break;
                    }
                    case "RPG_INVENTORY": {
                        const { user, item, action } = event;
                        const profile = getOrCreateProfile(user);
                        if (action === "ADD") {
                            profile.envanter.push(item);
                        } else if (action === "REMOVE") {
                            const idx = profile.envanter.indexOf(item);
                            if (idx !== -1) {
                                profile.envanter.splice(idx, 1);
                            }
                        }
                        break;
                    }
                    case "RPG_RELATION": {
                        const { user1, user2, status } = event;
                        const key = getRelationshipKey(user1, user2);
                        if (status === "NONE") {
                            rpgRelations.delete(key);
                        } else {
                            rpgRelations.set(key, status);
                        }
                        break;
                    }
                    case "RPG_HEALTH": {
                        const { user, health } = event;
                        const profile = getOrCreateProfile(user);
                        const parsedHealth = Number(health);
                        profile.health = Math.max(0, Math.min(100, isNaN(parsedHealth) ? 100 : parsedHealth));
                        break;
                    }
                    case "RPG_SOCIAL": {
                        const { user1, user2, affinity, hostility } = event;
                        const key = getRelationshipKey(user1, user2);
                        if (!rpgSocial.has(key)) {
                            rpgSocial.set(key, { affinity: 0, hostility: 0 });
                        }
                        const s = rpgSocial.get(key);
                        s.affinity = Math.max(0, s.affinity + (affinity || 0));
                        s.hostility = Math.max(0, s.hostility + (hostility || 0));
                        break;
                    }
                    case "UNDER_ATTACK": {
                        underAttackMode = event.active;
                        break;
                    }
                }

                if (!isReplaying) {
                    updateGlobalLeaderboardUI();
                }
            }

            function updateGlobalLeaderboardUI() {
                let genelEnIyiSkor = 0;
                let genelEnIyiKullanici = '';
                for (const [user, score] of enIyiSkorlarMap.entries()) {
                    if (score > genelEnIyiSkor) {
                        genelEnIyiSkor = score;
                        genelEnIyiKullanici = user;
                    }
                }
                if (genelEnIyiKullanici) {
                    skorGosterici.textContent = `En Yüksek Skor: ${genelEnIyiKullanici} - ${genelEnIyiSkor.toFixed(0)}/100`;
                }
            }

            // --- WAL STORAGE ENGINE ---
            class PairaWAL {
                constructor() {
                    this.dbName = "PairaBotDB";
                    this.storeName = "wal_logs";
                    this.opfsFileName = "paira_wal.log";
                    this.fileHandle = null;
                    this.opfsFileHandle = null;
                    this.db = null;
                    this.storageType = "none";
                    this.channel = new BroadcastChannel("paira_wal_sync");
                    this.writeQueue = Promise.resolve();
                }

                async init() {
                    await this.initIndexedDB();

                    // 1. Try File System Access API
                    try {
                        const storedHandle = await this.getStoredFileHandle();
                        if (storedHandle) {
                            const opts = { mode: 'readwrite' };
                            if ((await storedHandle.queryPermission(opts)) === 'granted') {
                                this.fileHandle = storedHandle;
                                this.storageType = "file";
                                console.log("📝 WAL initialized using Local File System.");
                            }
                        }
                    } catch (e) {
                        console.warn("File System Access API failed:", e);
                    }

                    // 2. Try OPFS
                    if (this.storageType === "none") {
                        try {
                            if (navigator.storage && navigator.storage.getDirectory) {
                                const root = await navigator.storage.getDirectory();
                                this.opfsFileHandle = await root.getFileHandle(this.opfsFileName, { create: true });
                                this.storageType = "opfs";
                                console.log("📝 WAL initialized using OPFS.");
                            }
                        } catch (e) {
                            console.warn("OPFS failed:", e);
                        }
                    }

                    // 3. Fallback to IDB
                    if (this.storageType === "none") {
                        this.storageType = "idb";
                        console.log("📝 WAL initialized using IndexedDB.");
                    }

                    this.channel.onmessage = (event) => {
                        if (event.data && event.data.type === "WAL_APPEND") {
                            handleIncomingWALEvent(event.data.payload, false);
                        }
                    };

                    const logs = await this.readAll();
                    console.log(`Replaying ${logs.length} WAL log entries...`);
                    for (const log of logs) {
                        handleIncomingWALEvent(log, true);
                    }
                    updateGlobalLeaderboardUI();
                }

                async initIndexedDB() {
                    return new Promise((resolve, reject) => {
                        const request = indexedDB.open(this.dbName, 1);
                        request.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if (!db.objectStoreNames.contains(this.storeName)) {
                                db.createObjectStore(this.storeName, { keyPath: "id", autoIncrement: true });
                            }
                            if (!db.objectStoreNames.contains("settings")) {
                                db.createObjectStore("settings");
                            }
                        };
                        request.onsuccess = (e) => {
                            this.db = e.target.result;
                            resolve();
                        };
                        request.onerror = (e) => reject(e);
                    });
                }

                async getStoredFileHandle() {
                    return new Promise((resolve) => {
                        if (!this.db) return resolve(null);
                        const tx = this.db.transaction("settings", "readonly");
                        const store = tx.objectStore("settings");
                        const req = store.get("file_handle");
                        req.onsuccess = () => resolve(req.result || null);
                        req.onerror = () => resolve(null);
                    });
                }

                async storeFileHandle(handle) {
                    return new Promise((resolve) => {
                        if (!this.db) return resolve();
                        const tx = this.db.transaction("settings", "readwrite");
                        const store = tx.objectStore("settings");
                        const req = store.put(handle, "file_handle");
                        req.onsuccess = () => resolve();
                        req.onerror = () => resolve();
                    });
                }

                async append(payload) {
                    this.writeQueue = this.writeQueue.then(async () => {
                        await this._executeAppend(payload);
                    }).catch(err => {
                        console.error("WAL append serialization queue error:", err);
                    });
                    return this.writeQueue;
                }

                async _executeAppend(payload) {
                    const logEntry = {
                        ...payload,
                        ts: Date.now()
                    };

                    if (this.storageType === "file" && this.fileHandle) {
                        try {
                            const file = await this.fileHandle.getFile();
                            const writable = await this.fileHandle.createWritable({ keepExistingData: true });
                            await writable.seek(file.size);
                            await writable.write(JSON.stringify(logEntry) + "\n");
                            await writable.close();
                        } catch (e) {
                            try {
                                const file = await this.fileHandle.getFile();
                                const text = await file.text();
                                const writable = await this.fileHandle.createWritable();
                                await writable.write(text + JSON.stringify(logEntry) + "\n");
                                await writable.close();
                            } catch (err) {
                                console.error("Error writing file, fallback to IDB:", err);
                                await this.writeToIDB(logEntry);
                            }
                        }
                    } else if (this.storageType === "opfs" && this.opfsFileHandle) {
                        try {
                            const file = await this.opfsFileHandle.getFile();
                            const writable = await this.opfsFileHandle.createWritable({ keepExistingData: true });
                            await writable.seek(file.size);
                            await writable.write(JSON.stringify(logEntry) + "\n");
                            await writable.close();
                        } catch (e) {
                            try {
                                const file = await this.opfsFileHandle.getFile();
                                const text = await file.text();
                                const writable = await this.opfsFileHandle.createWritable();
                                await writable.write(text + JSON.stringify(logEntry) + "\n");
                                await writable.close();
                            } catch (err) {
                                console.error("Error writing OPFS, fallback to IDB:", err);
                                await this.writeToIDB(logEntry);
                            }
                        }
                    } else {
                        await this.writeToIDB(logEntry);
                    }

                    handleIncomingWALEvent(logEntry, false);

                    this.channel.postMessage({
                        type: "WAL_APPEND",
                        payload: logEntry
                    });
                }

                async writeToIDB(logEntry) {
                    return new Promise((resolve) => {
                        if (!this.db) return resolve();
                        const tx = this.db.transaction(this.storeName, "readwrite");
                        const store = tx.objectStore(this.storeName);
                        store.add({ data: JSON.stringify(logEntry) });
                        tx.oncomplete = () => resolve();
                        tx.onerror = tx.onabort = () => {
                            console.error("IndexedDB write failed");
                            resolve();
                        };
                    });
                }

                async readAll() {
                    const logs = [];
                    if (this.storageType === "file" && this.fileHandle) {
                        try {
                            const file = await this.fileHandle.getFile();
                            const text = await file.text();
                            const lines = text.split("\n");
                            for (const line of lines) {
                                if (line.trim()) logs.push(JSON.parse(line));
                            }
                            return logs;
                        } catch (e) {
                            console.error("Error reading file WAL:", e);
                        }
                    }

                    if (this.storageType === "opfs" && this.opfsFileHandle) {
                        try {
                            const file = await this.opfsFileHandle.getFile();
                            const text = await file.text();
                            const lines = text.split("\n");
                            for (const line of lines) {
                                if (line.trim()) logs.push(JSON.parse(line));
                            }
                            return logs;
                        } catch (e) {
                            console.error("Error reading OPFS WAL:", e);
                        }
                    }

                    return new Promise((resolve) => {
                        if (!this.db) return resolve([]);
                        const tx = this.db.transaction(this.storeName, "readonly");
                        const store = tx.objectStore(this.storeName);
                        const req = store.getAll();
                        req.onsuccess = () => {
                            const results = req.result || [];
                            const parsed = results.map(r => JSON.parse(r.data));
                            resolve(parsed);
                        };
                        req.onerror = () => resolve([]);
                    });
                }

                    const wall1X = hitLeftFirst ? 0 : (ekranGenisligi - karakterGenisligi);
                    const wall2X = hitLeftFirst ? (ekranGenisligi - karakterGenisligi) : 0;

                    const B_prime = { x: 2 * wall2X - B.x, y: B.y };
                    const B_double_prime = { x: 2 * wall1X - B_prime.x, y: B_prime.y };

                    let slope = (B_double_prime.y - A.y) / (B_double_prime.x - A.x);
                    const P1 = {
                        x: wall1X,
                        y: A.y + slope * (wall1X - A.x)

                    let slope_P1B_prime = (B_prime.y - P1.y) / (B_prime.x - P1.x);
                    const P2 = {
                        x: wall2X,
                        y: P1.y + slope_P1B_prime * (wall2X - P1.x)
                    };

                    const distance = (pA, pB) => Math.sqrt(Math.pow(pB.x - pA.x, 2) + Math.pow(pB.y - pA.y, 2));
                    const lerp = (start, end, t) => start + (end - start) * t;
                    const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

                    const dist_AP1 = distance(A, P1);

                            currentY = lerp(P1.y, P2.y, segment_t);

                        requestAnimationFrame(sikeAnimasyon);

                    requestAnimationFrame(sikeAnimasyon);

                    return;
                }

                const profile = getOrCreateProfile(kullaniciAdi);
                const healthFactor = profile.health / 100;
                let angleDev = 0;
                if (healthFactor < 1.0) {
                    angleDev = (Math.random() - 0.5) * 70 * (1 - healthFactor);
                    console.log(`🤕 ${kullaniciAdi} yaralı (Sağlık: %${profile.health})! Sapma: ${angleDev.toFixed(1)} derece.`);
                }

                const yon = Math.random() > 0.5 ? 1 : -1;
                const minAci = AYARLAR.fizik.minimumAci;
                const maxAci = AYARLAR.fizik.maksimumAci;
                const rastgeleTemelAci = (Math.random() * (maxAci - minAci)) + minAci;
                const rastgeleAci = (rastgeleTemelAci + angleDev) * yon;
                const baslangicHiz = (AYARLAR.fizik.temelHiz + Math.random() * AYARLAR.fizik.hizVaryasyon) * ortalamaOran;
                const yerCekimi = AYARLAR.fizik.yerCekimi * ortalamaOran;
                const minIvme = AYARLAR.fizik.minimumIvme || 0.01;
                const maxIvme = AYARLAR.fizik.maksimumIvme || 0.05;
                const yatayIvmeMiktari = (Math.random() * (maxIvme - minIvme) + minIvme) * ortalamaOran;
                const maksimumYatayHiz = 18.0 * ortalamaOran;
                const maksimumDikeyHiz = 6.0 * ortalamaOran;

                let vx = Math.sin(rastgeleAci * Math.PI / 180) * baslangicHiz;
                let vy = (Math.abs(Math.cos(rastgeleAci * Math.PI / 180) * baslangicHiz));
                console.log(`📍 İlk pozisyon ayarlanıyor: x=${x}, y=${y}, vx=${vx}, vy=${vy}`);
                karakter.style.transform = `translate3d(${x}px, ${y}px, 0)`;
                kullaniciEtiketi.style.transform = `translate3d(${x + karakterGenisligi / 2}px, ${y - 20 * ortalamaOran}px, 0) translateX(-50%)`;

                karakterPozisyonlari.set(kullaniciAdi, {
                    x: x, y: y, vx: vx, vy: vy,
                    yatayIvme: yatayIvmeMiktari,
                    genislik: karakterGenisligi,
                    yukseklik: karakterYuksekligi,
                    karakter: karakter, kullaniciEtiketi: kullaniciEtiketi,
                    sonCarpismaZamani: 0,
                    sonCarpismaKullanici: null
                });
                console.log(`📝 Karakter pozisyonu kaydedildi: ${kullaniciAdi}`);

                let sonFrameZamani = 0;
                const hedefFPS = 60;
                const frameSuresi = 1000 / hedefFPS;

                const animasyon = (mevcutZaman) => {
                    if (mevcutZaman - sonFrameZamani < frameSuresi) {
                        requestAnimationFrame(animasyon);
                        return;
                    }
                    sonFrameZamani = mevcutZaman;
                    const mevcutPozisyon = karakterPozisyonlari.get(kullaniciAdi);
                    if (!mevcutPozisyon) {
                        return;
                    }

                    x = mevcutPozisyon.x;
                    y = mevcutPozisyon.y;
                    vx = mevcutPozisyon.vx;
                    vy = mevcutPozisyon.vy;

                    const deltaTime = 1.0;
                    vy += yerCekimi * deltaTime;
                    const ivme = mevcutPozisyon.yatayIvme || 0;
                    if (vx > 0) { vx += ivme * deltaTime; } else if (vx < 0) { vx -= ivme * deltaTime; }
                    x += vx * deltaTime;
                    y += vy * deltaTime;
                    const sinirliHiz = hizSinirla(vx, vy, maksimumYatayHiz, maksimumDikeyHiz);
                    vx = sinirliHiz.vx;
                    vy = sinirliHiz.vy;
                    if (x <= 0) {
                        const rastgeleSekmeKatsayisi = Math.random() * (1.20 - 0.95) + 0.95;
                        vx = Math.abs(vx) * rastgeleSekmeKatsayisi;
                        x = 0;
                    } else if (x + karakterGenisligi >= ekranGenisligi) {
                        const rastgeleSekmeKatsayisi = Math.random() * (1.20 - 0.95) + 0.95;
                        vx = -Math.abs(vx) * rastgeleSekmeKatsayisi;
                        x = ekranGenisligi - karakterGenisligi;
                    }
                    const carpismaSonucu = karakterCarpismaTespiti(kullaniciAdi, x, y, karakterGenisligi, karakterYuksekligi);
                    if (carpismaSonucu.carpisma) {
                        const digerPozisyon = carpismaSonucu.digerPozisyon;
                        const digerKullanici = carpismaSonucu.digerKullanici;
                        const cooldownBitti = (mevcutPozisyon.sonCarpismaKullanici !== digerKullanici) || (mevcutZaman - mevcutPozisyon.sonCarpismaZamani > 100);
                        if (cooldownBitti && digerPozisyon) {
                            const benimMerkezX = x + karakterGenisligi / 2;
                            const digerMerkezX = digerPozisyon.x + karakterGenisligi / 2;
                            const benimMerkezY = y + karakterYuksekligi / 2;
                            const digerMerkezY = digerPozisyon.y + karakterYuksekligi / 2;
                            const farkX = benimMerkezX - digerMerkezX;
                            const farkY = benimMerkezY - digerMerkezY;
                            const mesafe = Math.sqrt(farkX * farkX + farkY * farkY);

                            if (mesafe < 0.1) {
                                const rastgeleAci = Math.random() * Math.PI * 2;
                                const itmeGucu = 3.0;
                                x += Math.cos(rastgeleAci) * itmeGucu;
                                y += Math.sin(rastgeleAci) * itmeGucu;
                            }

                            const toplamYariGenislik = (karakterGenisligi / 2) + ((digerPozisyon.genislik || digerPozisyon.karakter.clientWidth) / 2);
                            const toplamYariYukseklik = (karakterYuksekligi / 2) + ((digerPozisyon.yukseklik || digerPozisyon.karakter.clientHeight) / 2);
                            const overlapX = toplamYariGenislik - Math.abs(farkX);
                            const overlapY = toplamYariYukseklik - Math.abs(farkY);

                            const elastikiyet = 0.8;
                            const surtunme = 0.98;

                            if (overlapX < overlapY) {
                                const itmeMiktari = (overlapX / 2) + 2.0;
                                if (farkX > 0) {
                                    x += itmeMiktari;
                                    digerPozisyon.x -= itmeMiktari;
                                } else {
                                    x -= itmeMiktari;
                                    digerPozisyon.x += itmeMiktari;
                                }

                                const toplamKutle = 2;
                                const benimYeniVx = ((vx * (1 - elastikiyet) + digerPozisyon.vx * (1 + elastikiyet)) / toplamKutle) * surtunme;
                                const digerYeniVx = ((digerPozisyon.vx * (1 - elastikiyet) + vx * (1 + elastikiyet)) / toplamKutle) * surtunme;

                                vx = benimYeniVx;
                                digerPozisyon.vx = digerYeniVx;

                                const itmeHizi = 0.5 * ortalamaOran;
                                if (farkX > 0) {
                                    vx += itmeHizi;
                                    digerPozisyon.vx -= itmeHizi;
                                } else {
                                    vx -= itmeHizi;
                                    digerPozisyon.vx += itmeHizi;
                                }
                            } else {
                                const itmeMiktari = (overlapY / 2) + 2.0;
                                if (farkY > 0) {
                                    y += itmeMiktari;
                                    digerPozisyon.y -= itmeMiktari;
                                } else {
                                    y -= itmeMiktari;
                                    digerPozisyon.y += itmeMiktari;
                                }

                                const toplamKutle = 2;
                                const benimYeniVy = ((vy * (1 - elastikiyet) + digerPozisyon.vy * (1 + elastikiyet)) / toplamKutle) * surtunme;
                                const digerYeniVy = ((digerPozisyon.vy * (1 - elastikiyet) + vy * (1 + elastikiyet)) / toplamKutle) * surtunme;

                                vy = benimYeniVy;
                                digerPozisyon.vy = digerYeniVy;

                                const itmeHizi = 0.3 * ortalamaOran;
                                if (farkY > 0) {
                                    vy += itmeHizi;
                                    digerPozisyon.vy -= itmeHizi;
                                } else {
                                    vy -= itmeHizi;
                                    digerPozisyon.vy += itmeHizi;
                                }
                            }

                            mevcutPozisyon.sonCarpismaZamani = mevcutZaman;
                            mevcutPozisyon.sonCarpismaKullanici = digerKullanici;
                            digerPozisyon.sonCarpismaZamani = mevcutZaman;
                            digerPozisyon.sonCarpismaKullanici = kullaniciAdi;

                            const digerSinirliHiz = hizSinirla(digerPozisyon.vx, digerPozisyon.vy, maksimumYatayHiz, maksimumDikeyHiz);
                            digerPozisyon.vx = digerSinirliHiz.vx;
                            digerPozisyon.vy = digerSinirliHiz.vy;
                        }
                    }
                    mevcutPozisyon.x = x;
                    mevcutPozisyon.y = y;
                    mevcutPozisyon.vx = vx;
                    mevcutPozisyon.vy = vy;
                    karakter.style.transform = `translate3d(${Math.round(x)}px, ${Math.round(y)}px, 0)`;
                    kullaniciEtiketi.style.transform = `translate3d(${Math.round(x + karakterGenisligi / 2)}px, ${Math.round(y - 20 * ortalamaOran)}px, 0) translateX(-50%)`;
                    if (y + karakterYuksekligi >= guncelYukseklik) {
                        y = guncelYukseklik - karakterYuksekligi;
                        karakter.style.transform = `translate3d(${Math.round(x)}px, ${Math.round(y)}px, 0)`;
                        vy = 0;
                        vx = 0;
                        let basariliAtlayis = false;
                        if (!havuzGizli) {
                            const karakterMerkez = x + karakterGenisligi / 2;
                            const havuzLeft = parseInt(havuz.style.left) || 0;
                            const havuzWidth = parseInt(havuz.style.width) || 298;
                            const havuzMerkezi = havuzLeft + havuzWidth / 2;
                            const mesafe = Math.abs(karakterMerkez - havuzMerkezi);

                            // Artık doğru, dinamik olarak hesaplanmış değerleri kullanıyor
                            const basariMesafeSiniri = AYARLAR.puanlama.basariMesafeSiniri * ortalamaOran;
                            const puanlamaKatsayisi = AYARLAR.puanlama.puanlamaKatsayisi * ortalamaOran;

                            if (mesafe < basariMesafeSiniri) {
                                basariliAtlayis = true;
                                // YENİ: Dinamik puanlama - target boyutuna göre otomatik ayarlanıyor
                                const puan = Math.max(0, Math.min(100, Math.round((basariMesafeSiniri - mesafe) / puanlamaKatsayisi)));

                                // Hedef boyutu bilgisi (küçük hedef için ek mesaj)
                                let zorlukBilgisi = '';
                                if (targetGercekGenislik < 200) { // 300px'e ölçeklenmiş temel genişlik
                                    zorlukBilgisi = ` 🎯 Küçük hedef!`;
                                } else if (targetGercekGenislik > 400) {
                                    zorlukBilgisi = ` 🎪 Büyük hedef!`;
                                }

                                console.log(`🏆 HAVUZ TUTTURULDU! ${kullaniciAdi} - Puan: ${puan}, Mesafe: ${mesafe.toFixed(1)}, Target: ${targetGercekGenislik}x${targetGercekYukseklik.toFixed(0)}`);

                                const skorMesaji = `Tebrikler @${kullaniciAdi}! Havuzu ${puan.toFixed(0)} puanla tutturdun!${zorlukBilgisi}`;
                                sendChatMessageToKick(skorMesaji);

                                PairaWALInstance.append({ type: "SCORE", user: kullaniciAdi, score: puan });
                                PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: kullaniciAdi, amount: puan, reason: "jump" });

                            } else {
                                console.log(`💥 HAVUZ KAÇIRILDI! ${kullaniciAdi} - Mesafe: ${mesafe.toFixed(1)}`);
                            }
                        } else {
                            console.log('💥 HAVUZ KAÇIRILDI! (Havuz gizliydi)');
                        }
                        const beklemeSuresi = basariliAtlayis ? 3000 : 100;
                        setTimeout(() => {
                            karakter.style.opacity = '0';
                            kullaniciEtiketi.style.opacity = '0';
                            karakterPozisyonlari.delete(kullaniciAdi);
                            setTimeout(() => {
                                if (karakter.parentNode) karakter.parentNode.removeChild(karakter);
                                if (kullaniciEtiketi.parentNode) kullaniciEtiketi.parentNode.removeChild(kullaniciEtiketi);
                            }, 300);
                        }, beklemeSuresi);
                        return;
                    }
                    requestAnimationFrame(animasyon);
                };
                requestAnimationFrame(animasyon);
            }

            function hizSinirla(vx, vy, maksimumYatayHiz, maksimumDikeyHiz) {
                if (Math.abs(vx) > maksimumYatayHiz) { vx = vx > 0 ? maksimumYatayHiz : -maksimumYatayHiz; }
                if (Math.abs(vy) > maksimumDikeyHiz) { vy = vy > 0 ? maksimumDikeyHiz : -maksimumDikeyHiz; }
                return { vx, vy };
            }

            // Basit dikdörtgen çarpışma tespiti (AABB)
            function karakterCarpismaTespiti(mevcutKullanici, x, y, karakterGenisligi, karakterYuksekligi) {
                for (const [kullaniciAdi, pozisyon] of karakterPozisyonlari) {
                    if (kullaniciAdi === mevcutKullanici) continue;
                    if (!pozisyon || !pozisyon.karakter) continue;

                    const digerX = pozisyon.x;
                    const digerY = pozisyon.y;
                    if (digerX === undefined || digerY === undefined) continue;

                    const digerGenislik = pozisyon.genislik || pozisyon.karakter.clientWidth;
                    const digerYukseklik = pozisyon.yukseklik || pozisyon.karakter.clientHeight;

                    // Basit AABB (dikdörtgen) çarpışma kontrolü
                    if (x < digerX + digerGenislik && x + karakterGenisligi > digerX &&
                        y < digerY + digerYukseklik && y + karakterYuksekligi > digerY) {

                        if (pozisyon.vx !== undefined && pozisyon.vy !== undefined) {
                            return { carpisma: true, digerKullanici: kullaniciAdi, digerPozisyon: pozisyon };
                        }
                    }
                }
                return { carpisma: false };
            }

            let messageQueue = [];
            let isSendingMessage = false;
            let throttleDelay = 300;

            async function sendChatMessageToKick(mesaj) {
                if (!mesaj) return;
                
                if (messageQueue.length >= 10) {
                    console.warn("⚠️ Mesaj kuyruğu dolu (max 10), yeni mesaj atıldı:", mesaj);
                    return;
                }
                
                messageQueue.push(mesaj);
                processMessageQueue();
            }

            async function processMessageQueue() {
                if (isSendingMessage || messageQueue.length === 0) return;
                isSendingMessage = true;

                const mesaj = messageQueue.shift();
                
                if (messageQueue.length >= 5) {
                    throttleDelay = 1000;
                } else if (messageQueue.length >= 2) {
                    throttleDelay = 500;
                } else {
                    throttleDelay = 300;
                }

                try {
                    await executeSendChatMessage(mesaj);
                } catch (e) {
                    console.error("Failed to send message:", e);
                }

                setTimeout(() => {
                    isSendingMessage = false;
                    processMessageQueue();
                }, throttleDelay);
            }

            async function fetchAccessToken(forceRefresh = false) {
                if (!broadcasterSecret || !broadcasterUserId || !paramUserId) {
                    console.warn('⚠️ Token Broker yapılandırması eksik (secret, broadcaster_user_id veya id).');
                    return null;
                }

                try {
                    const timestamp = Math.floor(Date.now() / 1000).toString();
                    // İmza = HMAC-SHA256(secret, "userId:timestamp:broadcaster_user_id:force_refresh")
                    const payload = `${paramUserId}:${timestamp}:${broadcasterUserId}:${forceRefresh ? 'true' : 'false'}`;
                    const encoder = new TextEncoder();
                    const keyData = encoder.encode(broadcasterSecret);
                    const msgData = encoder.encode(payload);

                    const cryptoKey = await crypto.subtle.importKey(
                        'raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
                    );
                    const signatureBuffer = await crypto.subtle.sign('HMAC', cryptoKey, msgData);
                    const signature = Array.from(new Uint8Array(signatureBuffer))
                        .map(b => b.toString(16).padStart(2, '0')).join('');

                    const response = await fetch(SERVERLESS_CHAT_API, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Signature': signature,
                            'X-Timestamp': timestamp,
                            'X-User-Id': paramUserId
                        },
                        body: JSON.stringify({
                            broadcaster_user_id: broadcasterUserId,
                            force_refresh: forceRefresh
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.access_token) {
                            currentAccessToken = data.access_token;
                            console.log('✅ Yeni access_token başarıyla alındı.');
                            return currentAccessToken;
                        }
                    }
                    console.error('❌ Token dağıtıcıdan token alınamadı. HTTP', response.status);
                    return null;
                } catch (error) {
                    console.error('❌ Token alınırken hata oluştu:', error);
                    return null;
                }
            }

            async function executeSendChatMessage(mesaj, isRetry = false) {
                if (!broadcasterSecret || !broadcasterUserId || !paramUserId) {
                    console.warn('⚠️ Chat API yapılandırması eksik (secret, broadcaster_user_id veya id). Mesaj gönderilemedi:', mesaj);
                    return;
                }

                if (!currentAccessToken) {
                    const token = await fetchAccessToken(false);
                    if (!token) {
                        console.error('⚠️ Token alınamadığı için mesaj gönderilemiyor:', mesaj);
                        return;
                    }
                }

                try {
                    const chatPayload = {
                        broadcaster_user_id: parseInt(broadcasterUserId),
                        content: mesaj.substring(0, 500),
                        type: "bot"
                    };

                    const response = await fetch('https://api.kick.com/public/v1/chat', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${currentAccessToken}`,
                            'Content-Type': 'application/json',
                            'Accept': '*/*'
                        },
                        body: JSON.stringify(chatPayload)
                    });

                    if (response.ok) {
                        console.log(`📤 Mesaj doğrudan Kick API üzerinden gönderildi: ${mesaj}`);
                    } else if (response.status === 401 && !isRetry) {
                        console.warn('⚠️ Token geçersiz/süresi dolmuş (401). Yenilenip tekrar deneniyor...');
                        const token = await fetchAccessToken(true);
                        if (token) {
                            await executeSendChatMessage(mesaj, true);
                        } else {
                            console.error('❌ Token yenilenemedi, mesaj gönderilemedi.');
                        }
                    } else {
                        const errText = await response.text();
                        console.error(`❌ Kick Chat API Hatası (HTTP ${response.status}):`, errText);
                    }
                } catch (error) {
                    console.error('❌ Chat mesajı doğrudan gönderilirken ağ hatası:', error);
                }
            }

            function siraIslet() {
                if (atlamaSirasi.length === 0) {
                    console.log("✅ Toplu atlama sırası tamamlandı.");
                    return;
                }
                const atlayacakKisi = atlamaSirasi.shift();
                console.log(`▶️ Sıradan işletiliyor: ${atlayacakKisi.username} (Kalan: ${atlamaSirasi.length})`);
                atlaAnimasyonunuBaslat(atlayacakKisi.username, atlayacakKisi.emojiId);
                setTimeout(siraIslet, AYARLAR.topluAtlamaGecikmesi);
            }

            // updateOAuthStatus: Durum göstergesi kaldırıldı, çağrılar no-op.
            function updateOAuthStatus() {}

            // Python proxy kaldırıldı. Mesaj gönderimi artık doğrudan AWS API üzerinden yapılıyor.
            // connectToProxyServer fonksiyonu artık gerekli değil.

            let watchdogTimer = null;
            let reconnectDelay = 1000;
            let activeWS = null;

            function resetWatchdog(ws, chatroomId) {
                if (watchdogTimer) clearTimeout(watchdogTimer);
                watchdogTimer = setTimeout(() => {
                    console.warn("⚠️ Kick WebSocket inaktivite zaman aşımı (45s). Yeniden bağlanılıyor...");
                    ws.close();
                }, 45000);
            }

            function connectToKickChat(chatroomId) {
                if (activeWS) {
                    try {
                        activeWS.onopen = null;
                        activeWS.onmessage = null;
                        activeWS.onclose = null;
                        activeWS.onerror = null;
                        activeWS.close();
                    } catch (e) {
                        console.error("Error closing existing WS:", e);
                    }
                }

                console.log(`Kick sohbet sunucusuna bağlanılıyor: ${AYARLAR.kickWebSocketUrl}`);
                let ws;
                try {
                    ws = new WebSocket(AYARLAR.kickWebSocketUrl);
                    activeWS = ws;
                } catch (e) {
                    console.error("Failed to construct WebSocket:", e);
                    setTimeout(() => connectToKickChat(chatroomId), reconnectDelay);
                    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
                    return;
                }

                ws.onopen = () => {
                    console.log("Kick sohbet sunucusuna başarıyla bağlanıldı!");
                    const subscribeMessage = { event: "pusher:subscribe", data: { channel: `chatrooms.${chatroomId}.v2`, auth: "" } };
                    ws.send(JSON.stringify(subscribeMessage));
                    console.log(`'${chatroomId}' ID'li odaya abonelik isteği gönderildi.`);
                    reconnectDelay = 1000;
                    resetWatchdog(ws, chatroomId);
                };

                ws.onmessage = (event) => {
                    resetWatchdog(ws, chatroomId);
                    try {
                        const eventData = JSON.parse(event.data);

                        if (eventData.event === 'pusher:ping') {
                            ws.send(JSON.stringify({ event: 'pusher:pong' }));
                            return;
                        }

                        if (eventData.event === 'App\\Events\\ChatMessageEvent') {
                            const chatMessage = JSON.parse(eventData.data);

                            const username = chatMessage.sender?.username || 'Bilinmeyen';
                            const normalizedUsername = username.toLowerCase();
                            const content = (chatMessage.content || '').trim();
                            const cleanContent = content.toLowerCase();

                            // --- MODERATÖRLERİN OTOMATİK YETKİ ALMASI ---
                            const sender = chatMessage.sender || {};
                            const senderIdentity = sender.identity || {};
                            const senderBadges = senderIdentity.badges || [];

                            const isModerator = (
                                sender.is_moderator === true ||
                                sender.is_broadcaster === true ||
                                sender.is_owner === true ||
                                sender.is_staff === true ||
                                senderBadges.some(badge => {
                                    const t = (badge.type || '').toLowerCase();
                                    return t === 'moderator' || t === 'broadcaster' || t === 'owner' || t === 'staff' || t === 'mod';
                                })
                            );

                            if (isModerator && !AYARLAR.yetkiliListesi.includes(normalizedUsername)) {
                                AYARLAR.yetkiliListesi.push(normalizedUsername);
                                console.log(`🛡️ MOD OTOMATİK YETKİ: ${username} moderatör olarak algılandı ve yetkili listesine eklendi!`);
                            }

                            const isYetkili = AYARLAR.yetkiliListesi.includes(normalizedUsername);

                            // --- KRİZ MODU (UNDER ATTACK) KORUMASI ---
                            if (underAttackMode && !isYetkili) {
                                if (isAllCaps(content)) {
                                    sendChatMessageToKick(`/timeout ${username} 300`);
                                    sendChatMessageToKick(`🛡️ @${username}, kriz modunda büyük harf kullandığın için 5 dakika susturuldun.`);
                                    return;
                                }
                                const isGameCmd = cleanContent.startsWith('!atla') || 
                                                  cleanContent.startsWith('!profil') || 
                                                  cleanContent.startsWith('!puan') || 
                                                  cleanContent.startsWith('!market') || 
                                                  cleanContent.startsWith('!hediye') || 
                                                  cleanContent.startsWith('!evlen') || 
                                                  cleanContent.startsWith('!nişan') || 
                                                  cleanContent.startsWith('!bosan') || 
                                                  cleanContent.startsWith('!sev') || 
                                                  cleanContent.startsWith('!öp') || 
                                                  cleanContent.startsWith('!döv') || 
                                                  cleanContent.startsWith('!dayak');

                            // --- GAME ACTIVE CHECKS ---
                            if (wordGameActive && !cleanContent.startsWith('!')) {
                                const word = cleanContent.trim();

                                    if (word.includes(wordGamePattern.toLowerCase())) {
                                        if (!usedWords.has(word)) {
                                            const isValid = (turkishWordsSet.size === 0) || turkishWordsSet.has(word);
                                            if (isValid) {
                                                usedWords.add(word);
                                                const timerEl = document.getElementById('widget-timer');
                                                const remTime = timerEl ? (parseInt(timerEl.textContent) || 10) : 10;
                                                wordGameWinners.push({ user: username, word: word, score: remTime });
                                                updateWidgetFooter(`Son: ${word} (@${username})`);
                                                console.log(`✅ Kelime: ${word} from ${username} (+${remTime} pts)`);
                                            }
                                        }
                                    }
                                }
                            }

                            if (triviaActive && !cleanContent.startsWith('!')) {
                                const ans = cleanContent.trim();
                                if (ans === triviaAnswer) {
                                    if (!triviaWinners.includes(username)) {
                                        triviaWinners.push(username);
                                        updateWidgetFooter(`${triviaWinners.length} kişi doğru bildi!`);
                                        console.log(`🎯 Trivia doğru: ${username}`);
                                    }
                                }
                            }

                            // --- MODERATOR COMMANDS ---
                            if (isYetkili) {
                                if (cleanContent === '!underattack') {
                                    const nextState = !underAttackMode;
                                    PairaWALInstance.append({ type: "UNDER_ATTACK", active: nextState });
                                    sendChatMessageToKick(`⚠️ KRİZ MODU (Under Attack) ${nextState ? 'AKTİF EDİLDİ! Oyun komutları devredışı, spam engelleme devrede.' : 'KAPATILDI! Normale dönüldü.'}`);

                                }

                                if (cleanContent === '!trivia') {
                                    startTriviaGame();
                                    return;
                                }

                                if (cleanContent === '!kelimeoyunu') {
                                    startWordGame();
                                    return;
                                }

                                if (cleanContent === '!topluatla') {
                                    topluAtlamaAktif = true;
                                    atlamaSirasi = [];

                                }

                                if (cleanContent === '!atlat') {
                                    if (atlamaSirasi.length === 0) {
                                        console.warn("🟡 '!atlat' komutu alındı ama sıra boş.");
                                        sendChatMessageToKick(`⚠️ Sırada kimse yok! Önce '!topluatla' ile modu açın, herkes '!atla' yazsın.`);
                                        topluAtlamaAktif = false;
                                        return;
                                    }
                                    const kisiSayisi = atlamaSirasi.length;
                                    topluAtlamaAktif = false;
                                    console.warn(`🔴 TOPLU ATLAMA MODU KAPALI. ${kisiSayisi} kişilik sıra işletiliyor...`);

                                if (cleanContent === '!topluiptal') {
                                    if (topluAtlamaAktif) {

                                        topluAtlamaAktif = false;
                                        atlamaSirasi = [];
                                        console.warn(`❌ Toplu atlama iptal edildi. ${iptalEdilen} kişi sıradan çıkarıldı.`);
                                        sendChatMessageToKick(`❌ Toplu atlama iptal edildi! (${iptalEdilen} kişi sıradaydı)`);

                                        sendChatMessageToKick(`⚠️ Zaten aktif bir toplu atlama yok.`);
                                    }
                                    return;
                                }

                                if (cleanContent.startsWith('!ban ')) {
                                    const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                    const targetMention = cmdParts[1] || '';
                                    const targetName = targetMention.replace('@', '').trim();
                                    if (targetName) {
                                        sendChatMessageToKick(`/ban ${targetName}`);
                                        sendChatMessageToKick(`🛡️ @${targetName} kanaldan banlandı!`);

                                    return;
                                }
                            }

                            // --- USER COMMANDS WITH COOLDOWN ---
                            if (cleanContent === '!eniyi') {
                                if (!checkCommandCooldown(username, "!eniyi")) return;
                                const sortedScores = Array.from(enIyiSkorlarMap.entries())
                                    .sort((a, b) => b[1] - a[1])

                                        return `${index + 1}. ${entry[0]} (${entry[1].toFixed(0)} Puan)`;
