                                    chatMesaji += messages.join(' | ');
                                }
                                sendChatMessageToKick(chatMesaji);
                                return;
                            }

                            if (cleanContent === '!son') {
                                if (!checkCommandCooldown(username, "!son")) return;
                                let chatMesaji = "⏱️ Son Başarılı Atlayışlar: ";
                                if (sonSkorlar.length === 0) {
                                    chatMesaji = "Henüz başarılı bir atlayış olmadı.";
                                } else {
                                    const messages = sonSkorlar.map((entry) => {
                                        return `${entry.username} (${entry.score.toFixed(0)} Puan)`;
                                    });
                                    chatMesaji += messages.join(' | ');
                                }
                                sendChatMessageToKick(chatMesaji);
                                return;
                            }

                            if (cleanContent === '!sira') {
                                if (!checkCommandCooldown(username, "!sira")) return;
                                if (topluAtlamaAktif) {
                                    const siraListesi = atlamaSirasi.map(k => k.username).join(', ');
                                    sendChatMessageToKick(`📋 Sırada ${atlamaSirasi.length} kişi var: ${siraListesi || 'Henüz kimse yok'}`);
                                } else {
                                    sendChatMessageToKick(`⚠️ Toplu atlama modu şu an aktif değil.`);
                                }
                                return;
                            }
                            
                            if (cleanContent === '!katıl') {
                                PairaWALInstance.append({ type: "RAFFLE_JOIN", user: username });
                                console.log(`🎟️ ${username} çekilişe katıldı.`);
                                return;
                            }

                            // --- RPG COMMANDS ---
                            if (cleanContent === '!profil' || cleanContent === '!puan') {
                                if (!checkCommandCooldown(username, "!profil")) return;
                                const profile = getOrCreateProfile(username);
                                const partner = getMarriedPartner(username) || getEngagedPartner(username);
                                const partnerText = partner ? ` | 💍 Eş/Nişanlı: @${partner}` : '';
                                const invText = profile.envanter.length > 0 ? profile.envanter.join(', ') : 'Boş';
                                sendChatMessageToKick(`👤 @${username} | Seviye: ${profile.seviye} | Puan: ${profile.puan} | Sağlık: %${profile.health}${partnerText} | Envanter: [${invText}]`);
                                return;
                            }

                            if (cleanContent === '!market' || cleanContent.startsWith('!market ')) {
                                const items = {
                                    "1": { name: "Yüzük", price: 1000 },
                                    "2": { name: "Çiçek", price: 200 },
                                    "3": { name: "Madalya", price: 500 },
                                    "4": { name: "Kalp", price: 300 },
                                    "5": { name: "Yıldız", price: 400 }
                                };
                                
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                if (cmdParts.length === 1) {
                                    if (!checkCommandCooldown(username, "!market")) return;
                                    const catalog = Object.entries(items).map(([id, item]) => `${id}. ${item.name} (${item.price} Puan)`).join(' | ');
                                    sendChatMessageToKick(`🛒 Market: ${catalog} (Satın almak için: !market [id])`);
                                    return;
                                }
                                
                                const itemParam = cmdParts[1].trim();
                                const itemSelected = items[itemParam] || Object.values(items).find(i => i.name.toLowerCase() === itemParam.toLowerCase());
                                if (!itemSelected) {
                                    sendChatMessageToKick(`⚠️ @${username}, geçersiz ürün ID veya adı!`);
                                    return;
                                }
                                
                                const profile = getOrCreateProfile(username);
                                if (profile.puan < itemSelected.price) {
                                    sendChatMessageToKick(`⚠️ @${username}, yeterli puanın yok! Gerekli: ${itemSelected.price} | Mevcut: ${profile.puan}`);
                                    return;
                                }
                                
                                PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: username, amount: -itemSelected.price, reason: "market_buy" });
                                PairaWALInstance.append({ type: "RPG_INVENTORY", user: username, item: itemSelected.name, action: "ADD" });
                                sendChatMessageToKick(`🛒 @${username}, '${itemSelected.name}' satın aldı! Yeni bakiye: ${profile.puan - itemSelected.price} puan.`);
                                return;
                            }

                            if (cleanContent.startsWith('!hediye ')) {
                                if (!checkCommandCooldown(username, "!hediye")) return;
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                if (cmdParts.length < 3) {
                                    sendChatMessageToKick(`⚠️ Kullanım: !hediye [eşya_adı] @kullanıcı`);
                                    return;
                                }
                                const itemName = cmdParts[1].trim();
                                const targetMention = cmdParts[2].trim();
                                const targetName = targetMention.replace('@', '');
                                
                                const profile = getOrCreateProfile(username);
                                const itemIdx = profile.envanter.findIndex(i => i.toLowerCase() === itemName.toLowerCase());
                                if (itemIdx === -1) {
                                    sendChatMessageToKick(`⚠️ @${username}, envanterinde '${itemName}' bulunamadı.`);
                                    return;
                                }
                                const actualItemName = profile.envanter[itemIdx];
                                
                                PairaWALInstance.append({ type: "RPG_INVENTORY", user: username, item: actualItemName, action: "REMOVE" });
                                PairaWALInstance.append({ type: "RPG_INVENTORY", user: targetName, item: actualItemName, action: "ADD" });
                                sendChatMessageToKick(`🎁 @${username}, @${targetName} kullanıcısına '${actualItemName}' hediye etti!`);
                                return;
                            }

                            if (cleanContent.startsWith('!evlen ')) {
                                if (!checkCommandCooldown(username, "!evlen")) return;
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                const targetMention = cmdParts[1] || '';
                                const targetName = targetMention.replace('@', '').trim();
                                if (!targetName || targetName.toLowerCase() === normalizedUsername) {
                                    sendChatMessageToKick(`⚠️ Geçersiz eş seçimi.`);
                                    return;
                                }
                                
                                if (getMarriedPartner(username)) {
                                    sendChatMessageToKick(`⚠️ @${username}, zaten evlisin!`);
                                    return;
                                }
                                if (getMarriedPartner(targetName)) {
                                    sendChatMessageToKick(`⚠️ @${targetName} zaten evli!`);
                                    return;
                                }
                                
                                pendingMarriageProposals.set(targetName.toLowerCase(), {
                                    sender: username,
                                    ts: Date.now()
                                });
                                sendChatMessageToKick(`❤️ @${username}, @${targetName} kullanıcısına evlilik teklif etti! Kabul etmek için 60 saniye içinde '!evet' yazın.`);
                                return;
                            }

                            if (cleanContent.startsWith('!nişan ')) {
                                if (!checkCommandCooldown(username, "!nisan")) return;
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                const targetMention = cmdParts[1] || '';
                                const targetName = targetMention.replace('@', '').trim();
                                if (!targetName || targetName.toLowerCase() === normalizedUsername) {
                                    sendChatMessageToKick(`⚠️ Geçersiz seçim.`);
                                    return;
                                }
                                
                                if (getMarriedPartner(username) || getEngagedPartner(username)) {
                                    sendChatMessageToKick(`⚠️ @${username}, zaten evli veya nişanlısın!`);
                                    return;
                                }
                                if (getMarriedPartner(targetName) || getEngagedPartner(targetName)) {
                                    sendChatMessageToKick(`⚠️ @${targetName} zaten evli veya nişanlı!`);
                                    return;
                                }
                                
                                pendingEngagementProposals.set(targetName.toLowerCase(), {
                                    sender: username,
                                    ts: Date.now()
                                });
                                sendChatMessageToKick(`💍 @${username}, @${targetName} kullanıcısına nişan teklif etti! Kabul etmek için 60 saniye içinde '!evet' yazın.`);
                                return;
                            }

                            if (cleanContent === '!evet') {
                                if (!checkCommandCooldown(username, "!evet")) return;
                                const now = Date.now();
                                
                                const mProp = pendingMarriageProposals.get(normalizedUsername);
                                if (mProp && (now - mProp.ts < 60000)) {
                                    pendingMarriageProposals.delete(normalizedUsername);
                                    PairaWALInstance.append({ type: "RPG_RELATION", user1: mProp.sender, user2: username, status: "MARRIED" });
                                    sendChatMessageToKick(`🎉 Tebrikler! @${mProp.sender} ve @${username} artık evli! ❤️💍`);
                                    return;
                                }
                                
                                const eProp = pendingEngagementProposals.get(normalizedUsername);
                                if (eProp && (now - eProp.ts < 60000)) {
                                    pendingEngagementProposals.delete(normalizedUsername);
                                    PairaWALInstance.append({ type: "RPG_RELATION", user1: eProp.sender, user2: username, status: "ENGAGED" });
                                    sendChatMessageToKick(`💍 Tebrikler! @${eProp.sender} ve @${username} artık nişanlı! 🎉`);
                                    return;
                                }
                                
                                sendChatMessageToKick(`⚠️ @${username}, adına bekleyen aktif bir teklif bulunamadı.`);
                                return;
                            }

                            if (cleanContent === '!bosan') {
                                if (!checkCommandCooldown(username, "!bosan")) return;
                                const partner = getMarriedPartner(username) || getEngagedPartner(username);
                                if (!partner) {
                                    sendChatMessageToKick(`⚠️ @${username}, zaten evli veya nişanlı değilsin!`);
                                    return;
                                }
                                
                                const profile1 = getOrCreateProfile(username);
                                const profile2 = getOrCreateProfile(partner);
                                const tax1 = Math.round(profile1.puan * 0.10);
                                const tax2 = Math.round(profile2.puan * 0.10);
                                
                                PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: username, amount: -tax1, reason: "divorce_tax" });
                                PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: partner, amount: -tax2, reason: "divorce_tax" });
                                PairaWALInstance.append({ type: "RPG_RELATION", user1: username, user2: partner, status: "NONE" });
                                
                                sendChatMessageToKick(`💔 @${username} ve @${partner} boşandı. Boşanma vergisi olarak her iki taraftan da %10 puan silindi (Senden: ${tax1}, Ondan: ${tax2}).`);
                                return;
                            }

                            if (cleanContent.startsWith('!sev ') || cleanContent.startsWith('!öp ')) {
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                const targetMention = cmdParts[1] || '';
                                const targetName = targetMention.replace('@', '').trim();
                                if (!targetName || targetName.toLowerCase() === normalizedUsername) return;
                                
                                if (!checkCommandCooldown(username, "!sev")) return;
                                
                                PairaWALInstance.append({ type: "RPG_SOCIAL", user1: username, user2: targetName, affinity: 1, hostility: 0 });
                                sendChatMessageToKick(`❤️ @${username}, @${targetName} kullanıcısını sevdi! Yakınlık puanı arttı.`);
                                return;
                            }

                            if (cleanContent.startsWith('!döv ') || cleanContent.startsWith('!dayak ')) {
                                const cmdParts = content.split(/\s+/).filter(p => p.length > 0);
                                const targetMention = cmdParts[1] || '';
                                const targetName = targetMention.replace('@', '').trim();
                                if (!targetName || targetName.toLowerCase() === normalizedUsername) return;
                                
                                if (!checkCommandCooldown(username, "!döv")) return;
                                
                                const targetProfile = getOrCreateProfile(targetName);
                                const nextHealth = targetProfile.health - 10;
                                
                                PairaWALInstance.append({ type: "RPG_SOCIAL", user1: username, user2: targetName, affinity: 0, hostility: 1 });
                                
                                if (nextHealth <= 0) {
                                    PairaWALInstance.append({ type: "RPG_HEALTH", user: targetName, health: 100 });
                                    PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: targetName, amount: -50, reason: "hospital_bill" });
                                    sendChatMessageToKick(`👊 @${username}, @${targetName} kullanıcısını hastanelik etti! @${targetName} tedavi masrafı olarak 50 puan kaybetti. 🚑`);
                                } else {
                                    PairaWALInstance.append({ type: "RPG_HEALTH", user: targetName, health: nextHealth });
                                    sendChatMessageToKick(`👊 @${username}, @${targetName} kullanıcısını patakladı! @${targetName} sağlığı: %${nextHealth} (atlama şansı düştü)`);
                                }
                                return;
                            }

                            // --- ATLAMA COMMANDS ---
                            if (cleanContent === '!atla' || cleanContent.startsWith('!atla ')) {
                                let emojiId = null;
                                const emoteRegex = /\[emote:(\d+):.*?\]/;
                                const match = content.match(emoteRegex);
                                if (match && match[1]) { emojiId = match[1]; }

                                if (topluAtlamaAktif) {
                                    const zadenSirada = atlamaSirasi.some(k => k.username.toLowerCase() === normalizedUsername);

                                        console.log(`⚠️ ${username} zaten sırada, tekrar eklenmedi.`);

                                        console.log(`QUEUE: ${username} sıraya eklendi. (Sıradaki kişi: ${atlamaSirasi.length})`);

                                } else {
                                    console.log(`🚀 '!atla' komutu algılandı: ${username}`);
                                    atlaAnimasyonunuBaslat(username, emojiId);
                                }

                        }
                    } catch (error) {
                        console.error("Sohbet mesajı işlenirken hata:", error, event.data);
                    }
                };

                ws.onclose = () => {
                    if (watchdogTimer) clearTimeout(watchdogTimer);
                    console.log(`Kick sohbet bağlantısı kesildi. ${reconnectDelay / 1000} saniye sonra tekrar denenecek.`);
                    setTimeout(() => connectToKickChat(chatroomId), reconnectDelay);
                    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
                };

                ws.onerror = (error) => {
                    console.error("Kick WebSocket hatası:", error);
                    ws.close();
                };
            }

            // --- TRIVIA & WORD GAME MOTORU ---
            async function startTriviaGame() {
                if (triviaActive || wordGameActive) {
                    sendChatMessageToKick("⚠️ Zaten aktif bir oyun devam ediyor.");
                    return;
                }
                
                try {
                    const response = await fetch('trivia.json');
                    if (!response.ok) throw new Error();
                    const questions = await response.json();
                    if (!Array.isArray(questions) || questions.length === 0) throw new Error();
                    
                    const q = questions[Math.floor(Math.random() * questions.length)];
                    triviaActive = true;
                    triviaQuestion = q;
                    triviaAnswer = q.cevap.trim().toLowerCase();
                    triviaWinners = [];
                    
                    let timeLeft = 30;
                    showWidget(
                        "🧠 TRIVIA OYUNU",
                        `<div style="font-size:14px;font-weight:bold;margin-bottom:8px;">${q.soru}</div>
                         <div style="font-size:11px;opacity:0.8;">Kategori: ${q.kategori} | Zorluk: ${q.zorluk}</div>`,
                        timeLeft,
                        "Doğru cevabı chat'e yazın! (Sessiz)"
                    );
                    
                    sendChatMessageToKick(`🧠 TRIVIA BAŞLADI! Soru: ${q.soru} | Kategori: ${q.kategori} | Süre: 30sn.`);
                    
                    triviaTimer = setInterval(() => {
                        timeLeft--;
                        updateWidgetTimer(timeLeft);
                        
                        if (timeLeft <= 0) {
                            clearInterval(triviaTimer);
                            endTriviaGame();
                        }
                    }, 1000);
                } catch (e) {
                    sendChatMessageToKick("⚠️ trivia.json dosyası bulunamadı veya boş! Lütfen soru listesini ekleyin.");
                }
            }

            function endTriviaGame() {
                triviaActive = false;
                hideWidget();
                
                if (triviaWinners.length === 0) {
                    sendChatMessageToKick(`⏱️ Süre doldu! Kimse doğru cevabı veremedi. Doğru cevap: ${triviaQuestion.cevap}`);
                    return;
                }
                
                const rewardMap = [100, 50, 25];
                const winnersList = [];
                
                triviaWinners.slice(0, 3).forEach((winner, idx) => {
                    const pts = rewardMap[idx];
                    PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: winner, amount: pts, reason: "trivia_win" });
                    winnersList.push(`@${winner} (+${pts} Puan)`);
                });
                
                sendChatMessageToKick(`⏱️ Süre doldu! Doğru cevap: ${triviaQuestion.cevap} | Kazananlar: ${winnersList.join(' | ')}`);
            }

            async function startWordGame() {
                if (triviaActive || wordGameActive) {
                    sendChatMessageToKick("⚠️ Zaten aktif bir oyun devam ediyor.");
                    return;
                }
                
                const patterns = ["al", "ka", "te", "ma", "ar", "in", "or", "et", "li", "an", "de", "ko", "ba", "ya"];
                const pattern = patterns[Math.floor(Math.random() * patterns.length)].toUpperCase();
                
                wordGameActive = true;
                wordGamePattern = pattern;
                wordGameWinners = [];
                usedWords.clear();
                
                let timeLeft = 20;
                showWidget(
                    "📝 KELİME OYUNU",
                    `<div style="font-size:13px;margin-bottom:4px;">İçinde şu harfler geçen kelimeler yazın:</div>
                     <div class="widget-word-pattern">${pattern}</div>`,
                    timeLeft,
                    "Her kelime kalan süre kadar puan kazandırır!"
                );
                
                sendChatMessageToKick(`📝 KELİME OYUNU BAŞLADI! İçinde '${pattern}' geçen Türkçe kelimeler yazın! Süre: 20sn.`);
                
                wordGameTimer = setInterval(() => {
                    timeLeft--;
                    updateWidgetTimer(timeLeft);
                    
                    if (timeLeft <= 0) {
                        clearInterval(wordGameTimer);
                        endWordGame();
                    }
                }, 1000);
            }

            function endWordGame() {
                wordGameActive = false;
                hideWidget();
                
                if (wordGameWinners.length === 0) {
                    sendChatMessageToKick(`⏱️ Süre doldu! Kimse geçerli bir kelime yazamadı.`);
                    return;
                }
                
                const userScores = new Map();
                for (const win of wordGameWinners) {
                    const lowerUser = win.user.toLowerCase();
                    const existing = userScores.get(lowerUser) || { originalName: win.user, score: 0 };
                    existing.score += win.score;
                    userScores.set(lowerUser, existing);
                }
                
                const sortedWinners = Array.from(userScores.values())
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 3);
                
                const summaryList = [];
                for (const entry of sortedWinners) {
                    PairaWALInstance.append({ type: "RPG_POINT_CHANGE", user: entry.originalName, amount: entry.score, reason: "word_game" });
                    summaryList.push(`@${entry.originalName} (+${entry.score} Puan)`);
                }
                
                sendChatMessageToKick(`⏱️ Kelime oyunu bitti! En çok puan toplayanlar: ${summaryList.join(' | ')}`);
            }
